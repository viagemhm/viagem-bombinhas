<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestão de Gastos - Bombinhas 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <style>
        /* MOTOR DINÂMICO DE CORES (Idêntico à Index) */
        :root { 
            --theme-color: #f97316; 
            --theme-bg-light: rgba(249, 115, 22, 0.1); 
            --theme-border: rgba(249, 115, 22, 0.3);
            --theme-border-strong: rgba(249, 115, 22, 0.5);
        }

        .text-theme { color: var(--theme-color); transition: color 0.5s ease; }
        .bg-theme-light { background-color: var(--theme-bg-light); transition: background-color 0.5s ease; }
        .border-theme { border-color: var(--theme-border); transition: border-color 0.5s ease; }
        .border-theme-strong { border-color: var(--theme-border-strong); transition: border-color 0.5s ease; }
        .bg-theme { background-color: var(--theme-color); transition: background-color 0.5s ease; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; margin: 0; padding: 20px 10px; color: #f8fafc; min-height: 100vh; }
        .container { background: #0f0f0f; width: 100%; max-width: 420px; border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); margin: auto; }
        
        .finance-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--theme-border); border-radius: 16px; padding: 14px 10px; text-align: center; flex: 1; transition: all 0.3s ease; }
        .history-container { border-radius: 24px; padding: 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); margin: 0 16px 20px 16px; }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 14px 16px; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.2s ease, border-color 0.2s ease; }
        .history-item:hover { border-color: var(--theme-border); }
        .history-item:active { transform: scale(0.98); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .back-btn { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px; font-weight: 700; text-decoration: none; transition: color 0.3s; background: none; border: none; cursor: pointer; padding: 0; text-transform: uppercase; }
        .back-btn:hover { color: var(--theme-color); }
    </style>
</head>
<body id="body-theme">

<div class="container">
    <div class="p-4">
        <button class="back-btn" onclick="goBack(event)">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            VOLTAR AO INÍCIO
        </button>
    </div>

    <div class="profile-header border-theme-strong" style="height: 150px; background-image: url('https://i.ibb.co/j9xkVr6N/Afaste-a-imagem-202604072042.jpg'); background-size: cover; background-position: center; border-bottom-width: 6px; position: relative;">
        <div style="position: absolute; bottom: -35px; left: 24px; width: 80px; height: 80px; border: 4px solid #0f0f0f; border-radius: 50%; overflow: hidden; background: #222;">
            <img src="https://i.ibb.co/s9WK610w/Crie-uma-imagem-202604072021.jpg" class="w-full h-full object-cover">
        </div>
    </div>

    <div style="padding: 45px 24px 10px; display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h2 class="font-bold text-xl text-white">Helder e Mayara</h2>
            <div class="text-[11px] font-bold uppercase tracking-widest text-theme">Bombinhas • 2026</div>
        </div>
        <div class="text-right">
            <div class="text-[9px] font-bold text-white uppercase tracking-tighter mb-1">Data da Viagem</div>
            <div id="countdown" class="bg-theme-light border border-theme px-3 py-1 rounded-full text-[11px] font-black text-theme inline-block">Faltam -- dias</div>
        </div>
    </div>

    <h1 class="text-xl font-black px-6 mt-6 mb-4 tracking-tighter text-white">Gestão de Gastos</h1>

    <div class="flex gap-2 mb-6 px-4">
        <div class="finance-card hover:bg-white/5">
            <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Orçamento</div>
            <div class="font-extrabold text-white text-[13px] mt-1" id="orc">R$ 0,00</div>
        </div>
        <div class="finance-card hover:bg-white/5 bg-theme-light">
            <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Gasto</div>
            <div class="font-extrabold text-[13px] mt-1 text-theme" id="gas">R$ 0,00</div>
        </div>
        <div class="finance-card hover:bg-white/5">
            <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Saldo</div>
            <div class="font-extrabold text-[13px] mt-1 text-emerald-400" id="sal">R$ 0,00</div>
        </div>
    </div>

    <div class="history-container" id="history-bg">
        <h3 class="font-black text-sm flex items-center gap-2 mb-4 text-white uppercase tracking-widest">
            <span class="material-symbols-outlined text-theme text-[20px]">receipt_long</span> 
            Histórico
        </h3>
        <div class="space-y-2" id="lista-gastos">
            <div class="text-center py-8 text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Carregando despesas...</div>
        </div>
    </div>
    
    <footer class="mt-4 text-slate-600 text-[10px] font-bold uppercase tracking-widest text-center pb-8">
        Nossas Pegadas © 2026
    </footer>
</div>

<script>
// NAVEGAÇÃO
function goBack(event) {
    event.preventDefault();
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = 'index.html';
    }
}

// FORMATAÇÃO E ÍCONES
function formatar(valor) {
    let numericValue = typeof valor === 'string' ? parseFloat(valor.replace(/R\$\s?/, '').replace(/\./g, '').replace(',', '.').trim()) || 0 : valor;
    return numericValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function icone(desc) {
    const d = desc.toLowerCase();
    if (d.includes('jantar')) return '🍽️';
    if (d.includes('almoço')) return '🍛';
    if (d.includes('suco')) return '🍹';
    if (d.includes('bebida') || d.includes('cerveja')) return '🍻';
    if (d.includes('lanche') || d.includes('burger')) return '🍔';
    if (d.includes('combustível') || d.includes('gasolina') || d.includes('uber')) return '⛽';
    if (d.includes('pedágio')) return '🛣️';
    if (d.includes('sorvete') || d.includes('açaí')) return '🍦';
    if (d.includes('água')) return '💧';
    if (d.includes('coco')) return '🥥';
    if (d.includes('supermercado') || d.includes('mercado')) return '🛒';
    return '💸';
}

// MOTOR DE CORES DINÂMICO
const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';

function applyDynamicColors(timestampAtual, sunriseTs, sunsetTs) {
    const root = document.documentElement;
    const isNight = timestampAtual < sunriseTs || timestampAtual > sunsetTs;

    if (isNight) {
        root.style.setProperty('--theme-color', '#3b82f6'); 
        root.style.setProperty('--theme-bg-light', 'rgba(59, 130, 246, 0.1)');
        root.style.setProperty('--theme-border', 'rgba(59, 130, 246, 0.3)');
        root.style.setProperty('--theme-border-strong', 'rgba(59, 130, 246, 0.6)');
    } else {
        root.style.setProperty('--theme-color', '#f97316'); 
        root.style.setProperty('--theme-bg-light', 'rgba(249, 115, 22, 0.1)');
        root.style.setProperty('--theme-border', 'rgba(249, 115, 22, 0.3)');
        root.style.setProperty('--theme-border-strong', 'rgba(249, 115, 22, 0.6)');
    }
}

async function updateWeather() {
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Bombinhas,BR&units=metric&lang=pt_br&appid=${API_KEY}`);
        const data = await response.json();
        if (data.main) {
            applyDynamicColors(data.dt, data.sys.sunrise, data.sys.sunset);
        }
    } catch (e) {
        console.warn("Falha ao buscar clima, mantendo tema padrão");
    }
}

// LÓGICA DE CONTAGEM REGRESSIVA
function updateCountdown() {
    const target = new Date('2026-05-05T00:00:00').getTime();
    const now = new Date().getTime();
    const diff = target - now;
    
    if (diff > 0) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('countdown').innerText = `FALTAM ${days}D ${hours}H`;
    } else {
        document.getElementById('countdown').innerText = "VIVA O MOMENTO!";
    }
}

// LÓGICA DE BUSCA NA PLANILHA GOOGLE
function fetchExpenses() {
    fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSjndkscJNSa1uHNlh_3al_4smBXaiXrGKF27dIf_vK6uwUGF0eb_UzHj74Plx-cZ6PwE0EhnWSW-xA/pub?gid=0&single=true&output=tsv")
    .then(r => r.text())
    .then(t => {
        const lines = t.split("\n").map(l => l.split("\t"));
        if (lines.length < 1) return;
        
        const headers = lines[0].map(h => h.toLowerCase().trim());
        const descIdx = headers.findIndex(h => h.includes('descr'));
        const valIdx = headers.findIndex(h => h.includes('valor'));
        
        // Atualiza Cards de Resumo
        if (lines.length > 1) {
            const totals = lines[1];
            document.getElementById('orc').innerText = formatar(totals[0] || "0");
            document.getElementById('gas').innerText = formatar(totals[1] || "0");
            document.getElementById('sal').innerText = formatar(totals[2] || "0");
        }

        const historyContainer = document.getElementById('lista-gastos');
        historyContainer.innerHTML = "";
        
        let expenses = [];
        for(let i = 1; i < lines.length; i++) {
            if (!lines[i][descIdx]) continue;
            
            const desc = lines[i][descIdx].trim();
            const rawValor = lines[i][valIdx];
            
            if (desc !== "" && desc.toLowerCase() !== "descrição") {
                const cleanVal = (rawValor || "0").replace(/R\$\s?/, '').replace(/\./g, '').replace(',', '.').trim();
                const numericValue = parseFloat(cleanVal) || 0;
                if (numericValue > 0) {
                    expenses.push({ 
                        desc: desc, 
                        valor: numericValue,
                        formatted: formatar(rawValor || "0")
                    });
                }
            }
        }

        // Ordena do maior pro menor gasto
        expenses.sort((a, b) => b.valor - a.valor);
        
        if (expenses.length > 0) {
            expenses.forEach(exp => {
                const item = document.createElement('div');
                item.className = "history-item";
                
                // Destaca valores altos com a cor do tema
                const colorClass = exp.valor > 100 ? 'text-theme font-black' : 'text-white font-bold';

                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${icone(exp.desc)}</span>
                        <span class="font-bold text-zinc-300 text-[12px]">${exp.desc}</span>
                    </div>
                    <span class="text-[13px] tracking-wide ${colorClass}">${exp.formatted}</span>
                `;
                historyContainer.appendChild(item);
            });
        } else {
            historyContainer.innerHTML = '<div class="text-center py-8 text-zinc-500 text-[10px] font-black uppercase tracking-widest">Nenhuma despesa registrada</div>';
        }
    })
    .catch(err => {
        console.error("Erro ao buscar dados da planilha:", err);
        document.getElementById('lista-gastos').innerHTML = '<div class="text-center py-8 text-theme text-[10px] font-black uppercase">Erro ao carregar histórico</div>';
    });
}

// INICIALIZAÇÃO
updateWeather();
updateCountdown();
fetchExpenses();

// Atualiza de tempos em tempos
setInterval(updateCountdown, 60000);
setInterval(updateWeather, 600000); // 10 minutos
</script>
</body>
</html>
