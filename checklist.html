<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checklist - Bombinhas 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
<style>
        :root {
            --bg-main: #0a0a0a;
            --card-bg: #141414;
            --accent-primary: #f97316; /* Dynamic */
            --accent-glow: rgba(249, 115, 22, 0.4);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 12px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid var(--border-color);
        }

        .checklist-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px 16px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .checklist-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-glow);
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            appearance: none;
            position: relative;
            transition: all 0.2s;
        }

        input[type="checkbox"]:checked {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        input[type="checkbox"]:checked::after {
            content: 'check';
            font-family: 'Material Symbols Outlined';
            font-size: 16px;
            color: #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
        }

        input[type="checkbox"]:checked + span {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-top: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-primary);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            margin-bottom: 24px;
            transition: all 0.3s;
            align-self: flex-start;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .back-btn:hover {
            filter: brightness(1.2);
            transform: translateX(-4px);
        }

        /* Themes */
        .theme-orange { --accent-primary: #f97316; --accent-glow: rgba(249, 115, 22, 0.4); }
        .theme-yellow { --accent-primary: #eab308; --accent-glow: rgba(234, 179, 8, 0.4); }
        .theme-lightblue { --accent-primary: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.4); }
        .theme-darkblue { --accent-primary: #2563eb; --accent-glow: rgba(37, 99, 235, 0.4); }

        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding-bottom: 24px;
        }
    </style>
</head>
<body class="theme-orange" id="dynamic-body">
<div class="container flex flex-col">
<!-- BACK TO HOME -->
<button class="back-btn" onclick="goBack(event)">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span>Voltar ao Início</span>
</button>
<div class="main-card">
<!-- HEADER -->
<div class="flex justify-between items-start mb-10">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-full p-0.5 bg-gradient-to-tr from-[var(--accent-primary)] to-white/20">
<img alt="Profile" class="w-full h-full rounded-full object-cover bg-neutral-900" src="https://lh3.googleusercontent.com/aida/ADBb0ugocHj_uikm23nml2qCmFMrYHlUYX79LzQjJbK1bEU8DqSGoZigRbfmNvsaXn_nc_NU0zbCpPr1wvtyTNL6TGR8AvzJRQN1YB_pPXktma9gFdTbH2rFtp5GNKKi5d9TGGca_zBVwnYXu7jULE058Hy0jOtCyqsBTSdO8DbIocqwsXeJu5i3El67dSpMy-DYrZ4lKfc5tr7U87zPYHM-n5mEoMzolAb7-K8-WpQPZ0DlKVa2P-y_f8l0G87pyjgx19OtbgMrZxwMAA"/>
</div>
<div>
<h2 class="font-extrabold text-lg text-white leading-tight">Helder e Mayara</h2>
<div class="text-[10px] font-black text-[var(--accent-primary)] uppercase tracking-widest mt-0.5">BOMBINHAS 2026</div>
<div class="flex items-center gap-1.5 mt-1 text-[11px] font-semibold text-white/60">
<span class="material-symbols-outlined text-[14px] text-[var(--accent-primary)]" id="weather-icon">cloud</span>
<span id="weather-text">Carregando clima...</span>
</div>
</div>
</div>
<div class="text-right">
<div class="text-[10px] font-bold text-white/40 uppercase tracking-widest">VIAGEM</div>
<div class="text-sm font-black text-white">05/05/2026</div>
<div class="text-[10px] text-[var(--accent-primary)] font-bold mt-1" id="countdown">Faltam --d --h</div>
</div>
</div>
<!-- PROGRESS SECTION -->
<div class="mb-4">
<div class="flex justify-between items-end">
<div>
<div class="text-[10px] text-white/40 font-black uppercase tracking-widest mb-1">Seu Progresso</div>
<div class="text-4xl font-black text-white" id="progress-text">0%</div>
</div>
<div class="text-right text-[10px] font-bold text-white/60 uppercase tracking-tighter mb-1" id="progress-stats">
                    0 de 0 itens
                </div>
</div>
<div class="progress-bar-container">
<div class="progress-bar-fill" id="progress-bar"></div>
</div>
</div>
<!-- CHECKLIST SECTIONS -->
<div class="space-y-4 mt-10" id="checklist-content">
<!-- Sections injected via JS -->
</div>
</div>
<footer>
        Nossas Pegadas - Todos os direitos reservados
    </footer>
</div>
<script>
    // Note: In a real environment, you would use a proxy or serverless function to hide your API key.
    const OPENWEATHER_API_KEY = 'bd5e378503939ddaee76f12ad7a97608'; // Example key
    const CITY = 'Bombinhas,BR';

    // Mocking Google Sheets data fetch - for production you'd use Google Sheets API or a CSV export link
    const checklistData = [
        { category: 'Documentos & Essenciais', icon: 'description', items: ['Passaporte/RG', 'Seguro Viagem', 'Passagens Aéreas', 'Reserva de Hotel', 'Carteira de Motorista'] },
        { category: 'Roupas & Acessórios', icon: 'apparel', items: ['Roupas de Banho', 'Chinelo/Havaianas', 'Óculos de Sol', 'Boné ou Chapéu', 'Casaco Leve'] },
        { category: 'Higiene & Saúde', icon: 'medical_services', items: ['Protetor Solar', 'Repelente', 'Escova de Dentes', 'Kit Medicamentos', 'Desodorante'] },
        { category: 'Eletrônicos', icon: 'devices', items: ['Carregador de Celular', 'Power Bank', 'Fone de Ouvido', 'Adaptador de Tomada', 'Câmera/GoPro'] }
    ];

    function goBack(event) {
        event.preventDefault();
        window.history.back();
    }

    async function fetchWeather() {
        const weatherText = document.getElementById('weather-text');
        const weatherIcon = document.getElementById('weather-icon');
        
        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&lang=pt_br&appid=${OPENWEATHER_API_KEY}`);
            const data = await response.json();
            
            if (data.main) {
                const temp = Math.round(data.main.temp);
                const desc = data.weather[0].description;
                weatherText.textContent = `${temp}°C ${desc.charAt(0).toUpperCase() + desc.slice(1)}`;
                updateThemeByTemp(temp, data.weather[0].icon);
            }
        } catch (error) {
            console.error('Weather fetch error:', error);
            weatherText.textContent = "28°C Sol (Offline)";
            updateThemeByTemp(28, '01d');
        }
    }

    function updateThemeByTemp(temp, iconCode) {
        const body = document.getElementById('dynamic-body');
        body.classList.remove('theme-orange', 'theme-yellow', 'theme-lightblue', 'theme-darkblue');
        
        const weatherIcon = document.getElementById('weather-icon');
        
        // Dynamic Thermal Scale
        if (temp > 30) {
            body.classList.add('theme-orange');
        } else if (temp >= 24) {
            body.classList.add('theme-yellow');
        } else if (temp >= 18) {
            body.classList.add('theme-lightblue');
        } else {
            body.classList.add('theme-darkblue');
        }

        // Map OpenWeather icons to Material Symbols
        const iconMap = {
            '01': 'sunny',
            '02': 'partly_cloudy_day',
            '03': 'cloud',
            '04': 'cloudy',
            '09': 'rainy',
            '10': 'rainy_light',
            '11': 'thunderstorm',
            '13': 'ac_unit',
            '50': 'foggy'
        };
        const baseIcon = iconCode.substring(0, 2);
        weatherIcon.textContent = iconMap[baseIcon] || 'cloud';
    }

    function updateCountdown() {
        const target = new Date('2026-05-05T00:00:00').getTime();
        const now = new Date().getTime();
        const diff = target - now;
        
        if (diff > 0) {
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('countdown').textContent = `Faltam ${days}d ${hours}h ${mins}m`;
        } else {
            document.getElementById('countdown').textContent = "Aproveitem as férias!";
        }
    }

    function renderChecklist() {
        const container = document.getElementById('checklist-content');
        container.innerHTML = '';

        checklistData.forEach((section, sIdx) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'glass-section !mt-8 first:!mt-0';
            
            let headerHtml = `
                <h3 class="font-bold text-[12px] flex items-center gap-2 mb-4 text-white uppercase tracking-wider">
                    <span class="material-symbols-outlined text-[var(--accent-primary)] text-[18px]">${section.icon}</span>
                    ${section.category}
                </h3>
            `;

            let itemsHtml = section.items.map((item, iIdx) => {
                const itemId = `item-${sIdx}-${iIdx}`;
                const storageKey = `checklist_prog_bombinhas_2026_${itemId}`;
                const isChecked = localStorage.getItem(storageKey) === 'true';
                
                return `
                    <label class="checklist-item cursor-pointer">
                        <input type="checkbox" id="${itemId}" 
                               class="mr-4" 
                               ${isChecked ? 'checked' : ''} 
                               onchange="toggleItem('${itemId}')">
                        <span class="text-[14px] font-semibold text-white/80 transition-all">${item}</span>
                    </label>
                `;
            }).join('');

            sectionDiv.innerHTML = headerHtml + itemsHtml;
            container.appendChild(sectionDiv);
        });
        
        setTimeout(updateProgress, 50);
    }

    window.toggleItem = function(id) {
        const checkbox = document.getElementById(id);
        const storageKey = `checklist_prog_bombinhas_2026_${id}`;
        localStorage.setItem(storageKey, checkbox.checked);
        updateProgress();
    };

    function updateProgress() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        if (!checkboxes.length) return;
        
        const total = checkboxes.length;
        const checked = Array.from(checkboxes).filter(c => c.checked).length;
        const percentage = Math.round((checked / total) * 100);

        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('progress-text');
        const stats = document.getElementById('progress-stats');

        if (bar) bar.style.width = `${percentage}%`;
        if (text) text.textContent = `${percentage}%`;
        if (stats) stats.textContent = `${checked} de ${total} itens`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchWeather();
        renderChecklist();
        updateCountdown();
        setInterval(updateCountdown, 60000);
        setInterval(fetchWeather, 600000); // Update weather every 10 mins
    });
</script>
</body></html>
