<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Checklist - Bombinhas 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <style>
        :root { 
            --theme-color: #f97316; 
            --theme-bg-light: rgba(249, 115, 22, 0.1); 
            --theme-border: rgba(249, 115, 22, 0.3);
            --theme-border-strong: rgba(249, 115, 22, 0.5);
        }

        .text-theme { color: var(--theme-color); transition: color 0.5s ease; }
        .bg-theme-light { background-color: var(--theme-bg-light); transition: background-color 0.5s ease; }
        .border-theme { border-color: var(--theme-border); transition: border-color 0.5s ease; }
        .border-theme-strong { border-color: var(--theme-border-strong); transition: border-color 0.5s ease; }
        .bg-theme { background-color: var(--theme-color); transition: background-color 0.5s ease; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; margin: 0; padding: 20px 10px; color: #f8fafc; min-height: 100vh; }
        .container { background: #0f0f0f; width: 100%; max-width: 420px; border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); margin: auto; }
        
        .progress-container { background: rgba(255,255,255,0.03); border-radius: 24px; padding: 20px; border: 1px solid var(--theme-border); margin: 0 16px 20px 16px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--theme-color); transition: width 0.5s ease; box-shadow: 0 0 15px var(--theme-color); }

        .checklist-item { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; cursor: pointer; }
        .checklist-item.checked { opacity: 0.5; border-color: transparent; }
        .checklist-item.checked span { text-decoration: line-through; color: #64748b; }

        input[type="checkbox"] { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--theme-border); background: transparent; appearance: none; cursor: pointer; position: relative; transition: 0.3s; }
        input[type="checkbox"]:checked { background: var(--theme-color); border-color: var(--theme-color); }
        input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: black; font-weight: 900; left: 4px; top: -2px; font-size: 16px; }

        .back-btn { color: #94a3b8; font-size: 13px; font-weight: 700; transition: color 0.3s; background: none; border: none; cursor: pointer; text-transform: uppercase; }
        .back-btn:hover { color: var(--theme-color); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="body-theme">

<div class="container">
    <div class="p-4">
        <button onclick="window.location.href='index.html'" class="back-btn flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            VOLTAR AO INÍCIO
        </button>
    </div>

    <div class="profile-header border-theme-strong" style="height: 150px; background-image: url('https://i.ibb.co/j9xkVr6N/Afaste-a-imagem-202604072042.jpg'); background-size: cover; background-position: center; border-bottom-width: 6px; position: relative;">
        <div style="position: absolute; bottom: -35px; left: 24px; width: 80px; height: 80px; border: 4px solid #0f0f0f; border-radius: 50%; overflow: hidden; background: #222;">
            <img src="https://i.ibb.co/s9WK610w/Crie-uma-imagem-202604072021.jpg" class="w-full h-full object-cover">
        </div>
    </div>

    <div style="padding: 45px 24px 10px; display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h2 class="font-bold text-xl text-white">Helder e Mayara</h2>
            <div class="text-[11px] font-bold uppercase tracking-widest text-theme">Checklist • Viagem</div>
        </div>
        <div class="text-right">
            <div id="countdown" class="bg-theme-light border border-theme px-3 py-1 rounded-full text-[11px] font-black text-theme inline-block">Faltam -- dias</div>
        </div>
    </div>

    <div class="progress-container mt-6">
        <div class="flex justify-between items-end mb-2">
            <div class="text-[10px] font-black uppercase text-zinc-500">Itens Organizados</div>
            <div id="prog-txt" class="text-2xl font-black text-white">0%</div>
        </div>
        <div class="progress-bar">
            <div id="prog-fill" class="progress-fill"></div>
        </div>
    </div>

    <div id="checklist-render" class="px-4 pb-10 space-y-8">
        </div>
</div>

<footer class="mt-8 text-slate-600 text-[10px] font-bold uppercase tracking-widest text-center pb-10">
    Nossas Pegadas © 2026
</footer>

<script>
    const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
    
    // DEFINIÇÃO DOS ITENS
    const categorias = [
        {
            titulo: "Tecnologia & Gadgets",
            icon: "devices",
            itens: ["Carregadores de Celular", "Tripé", "Fone de Ouvido", "Notebook", "Power Bank"]
        },
        {
            titulo: "Essenciais de Bombinhas",
            icon: "beach_access",
            itens: ["Máscara de Snorkel", "Protetor Solar", "Repelente", "Toalhas de Praia", "Cooler / Térmica"]
        },
        {
            titulo: "Higiene Pessoal",
            icon: "content_cut",
            itens: ["Sabonete", "Pasta de Dente", "Escova de Dente", "Shampoo", "Desodorante"]
        },
        {
            titulo: "Casa e Pousada",
            icon: "home",
            itens: ["Roupas de Cama", "Fronhas", "Travesseiros", "Toalhas de Banho"]
        },
        {
            titulo: "Vestuário",
            icon: "checkroom",
            itens: ["Roupas de Banho", "Agasalho Leve", "Tênis para Trilhas", "Chinelo", "Óculos de Sol"]
        }
    ];

    // MOTOR DE CORES DINÂMICO
    function applyDynamicColors(timestampAtual, sunriseTs, sunsetTs) {
        const root = document.documentElement;
        const isNight = timestampAtual < sunriseTs || timestampAtual > sunsetTs;
        if (isNight) {
            root.style.setProperty('--theme-color', '#3b82f6'); 
            root.style.setProperty('--theme-bg-light', 'rgba(59, 130, 246, 0.1)');
            root.style.setProperty('--theme-border', 'rgba(59, 130, 246, 0.3)');
            root.style.setProperty('--theme-border-strong', 'rgba(59, 130, 246, 0.6)');
        } else {
            root.style.setProperty('--theme-color', '#f97316');
            root.style.setProperty('--theme-bg-light', 'rgba(249, 115, 22, 0.1)');
            root.style.setProperty('--theme-border', 'rgba(249, 115, 22, 0.3)');
            root.style.setProperty('--theme-border-strong', 'rgba(249, 115, 22, 0.6)');
        }
    }

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Bombinhas,BR&units=metric&lang=pt_br&appid=${API_KEY}`);
            const data = await res.json();
            applyDynamicColors(data.dt, data.sys.sunrise, data.sys.sunset);
        } catch (e) {}
    }

    function renderChecklist() {
        const container = document.getElementById('checklist-render');
        container.innerHTML = '';
        const checksSalvos = JSON.parse(localStorage.getItem('checklist_bombinhas')) || {};

        categorias.forEach(cat => {
            const section = document.createElement('div');
            section.innerHTML = `
                <h3 class="flex items-center gap-2 font-black text-[10px] uppercase text-theme mb-4 tracking-widest">
                    <span class="material-symbols-outlined text-[18px]">${cat.icon}</span>
                    ${cat.titulo}
                </h3>
                <div class="space-y-2">
                    ${cat.itens.map(item => {
                        const isChecked = checksSalvos[item] ? 'checked' : '';
                        return `
                            <label class="checklist-item ${isChecked}" onclick="toggleCheck('${item}')">
                                <input type="checkbox" ${isChecked} onclick="event.stopPropagation()">
                                <span class="ml-3 font-bold text-sm text-zinc-300">${item}</span>
                            </label>
                        `;
                    }).join('')}
                </div>
            `;
            container.appendChild(section);
        });
        updateProgress();
    }

    window.toggleCheck = function(item) {
        let checks = JSON.parse(localStorage.getItem('checklist_bombinhas')) || {};
        checks[item] = !checks[item];
        localStorage.setItem('checklist_bombinhas', JSON.stringify(checks));
        renderChecklist();
    };

    function updateProgress() {
        const total = categorias.reduce((acc, cat) => acc + cat.itens.length, 0);
        const checks = JSON.parse(localStorage.getItem('checklist_bombinhas')) || {};
        const marcados = Object.values(checks).filter(v => v === true).length;
        const porc = Math.round((marcados / total) * 100);

        document.getElementById('prog-fill').style.width = porc + '%';
        document.getElementById('prog-txt').innerText = porc + '%';
    }

    function updateCountdown() {
        const diff = new Date(2026, 4, 5) - new Date();
        const d = Math.floor(diff / 86400000);
        document.getElementById('countdown').innerText = d > 0 ? `Faltam ${d} dias` : "Partiu!";
    }

    window.onload = () => {
        fetchWeather();
        updateCountdown();
        renderChecklist();
    };
</script>
</body>
</html>
