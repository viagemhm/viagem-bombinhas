<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checklist - Bombinhas 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020817; /* Deep Night Blue from SCREEN_15 */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
            color: #f8fafc;
        }
        .container {
            background: #0f172a; /* Darker Blue Card from SCREEN_15 */
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.1);
            height: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .checklist-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .checklist-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        input[type="checkbox"] {
            background-color: #0f172a;
            border-color: #334155;
            width: 20px;
            height: 20px;
            border-radius: 6px;
        }
        input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            opacity: 0.4;
            color: #64748b;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            width: 0%;
            transition: width 0.5s ease-out;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: #00d4ff;
        }
        footer {
            margin-top: 24px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container">
<!-- BACK TO HOME -->
<a class="back-btn" href="index.html">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Voltar para o Início
    </a>
<!-- PERFIL E DATAS (Consistent with Home Screen) -->
<div class="flex justify-between items-start mb-6">
<div class="flex items-center gap-3">
<div class="w-16 h-16 rounded-full p-1 bg-gradient-to-tr from-cyan-500 to-blue-600">
<img class="w-full h-full rounded-full object-cover bg-gray-800" src="https://lh3.googleusercontent.com/aida/ADBb0ugL4H25Tgy0lCkPi5flCJStHJzeQE4AiFO64zofC4rMZkQh6f4RN0736lX_8wvFksrVfINZNMgo1avmhokUT2ucPXJzfV9XSEeOjzQjiIm-KaWc__cfJVlTl667SWB5W5lR3VHw9TDxT96crAbTf0wMIj_Ulxt_5Z7wW841K1RFYGIiDMq7NianZMu6s69Xpi2ZWLho0a_onebjP2p7dmasOOAUE7DKIggGERTyREuv1snDC4-cXkjQdeYkB6xN9fG9aoCjML3JXw"/>
</div>
<div>
<h2 class="font-bold text-white leading-tight">Helder e Mayara</h2>
<div class="text-[11px] font-bold text-cyan-400 uppercase tracking-tight">Bombinhas 2026</div>
<div class="flex gap-4 mt-1 text-xs text-slate-400">
<div>Checklist de Viagem</div>
</div>
</div>
</div>
<div class="text-right">
<div class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Viagem</div>
<div class="text-xs font-bold text-slate-300">05/05/2026</div>
<div class="text-[10px] text-cyan-400 font-bold mt-1" id="countdown">Faltam --d --h</div>
</div>
</div>
<!-- PROGRESS CARD -->
<div class="glass-section bg-[#1e293b]/50 border-cyan-500/20">
<div class="flex justify-between items-end">
<div>
<div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Seu Progresso</div>
<div class="text-2xl font-extrabold text-white" id="progress-text">0%</div>
</div>
<div class="text-right text-[11px] font-semibold text-cyan-400 uppercase" id="progress-stats">
                0 de 0 itens
            </div>
</div>
<div class="progress-bar-container">
<div class="progress-bar-fill" id="progress-bar"></div>
</div>
</div>
<!-- CHECKLIST SECTIONS -->
<div class="mt-4 space-y-6" id="checklist-content">
<!-- Sections will be injected here -->
</div>
</div>
<footer>
    Nossas Pegadas - Todos os direitos reservados
</footer>
<script>
    const checklistData = [
        { category: 'Documentos & Essenciais', icon: 'description', items: ['Passaporte/RG', 'Seguro Viagem', 'Passagens Aéreas', 'Reserva de Hotel', 'Carteira de Motorista'] },
        { category: 'Roupas & Acessórios', icon: 'apparel', items: ['Roupas de Banho', 'Chinelo/Havaianas', 'Óculos de Sol', 'Boné ou Chapéu', 'Casaco Leve'] },
        { category: 'Higiene & Saúde', icon: 'medical_services', items: ['Protetor Solar', 'Repelente', 'Escova de Dentes', 'Kit Medicamentos', 'Desodorante'] },
        { category: 'Eletrônicos', icon: 'devices', items: ['Carregador de Celular', 'Power Bank', 'Fone de Ouvido', 'Adaptador de Tomada', 'Câmera/GoPro'] }
    ];

    // COUNTDOWN (Same logic as Home)
    function updateCountdown() {
        const target = new Date('2026-05-05T00:00:00').getTime();
        const now = new Date().getTime();
        const diff = target - now;
        
        if (diff > 0) {
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('countdown').innerText = `Faltam ${days}d ${hours}h ${mins}m`;
        } else {
            document.getElementById('countdown').innerText = "Aproveite as férias!";
        }
    }
    setInterval(updateCountdown, 60000);
    updateCountdown();

    function renderChecklist() {
        const container = document.getElementById('checklist-content');
        container.innerHTML = '';

        checklistData.forEach((section, sIdx) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'glass-section';
            
            let headerHtml = `
                <h3 class="font-bold text-sm flex items-center gap-2 mb-4 text-white">
                    <span class="material-symbols-outlined text-cyan-400 text-lg">${section.icon}</span>
                    ${section.category}
                </h3>
            `;

            let itemsHtml = section.items.map((item, iIdx) => {
                const itemId = `item-${sIdx}-${iIdx}`;
                const storageKey = `checklist_prog_v2_${itemId}`;
                const isChecked = localStorage.getItem(storageKey) === 'true';
                
                return `
                    <label class="checklist-item cursor-pointer">
                        <input type="checkbox" id="${itemId}" 
                               class="rounded text-cyan-500 bg-slate-800 border-slate-600 focus:ring-cyan-400 mr-3" 
                               ${isChecked ? 'checked' : ''} 
                               onchange="toggleItem('${itemId}')">
                        <span class="text-sm font-medium text-slate-100 transition-all">${item}</span>
                    </label>
                `;
            }).join('');

            sectionDiv.innerHTML = headerHtml + itemsHtml;
            container.appendChild(sectionDiv);
        });
        
        updateProgress();
    }

    window.toggleItem = function(id) {
        const checkbox = document.getElementById(id);
        localStorage.setItem(`checklist_prog_v2_${id}`, checkbox.checked);
        updateProgress();
    };

    function updateProgress() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;
        const checked = Array.from(checkboxes).filter(c => c.checked).length;
        const percentage = total === 0 ? 0 : Math.round((checked / total) * 100);

        document.getElementById('progress-bar').style.width = `${percentage}%`;
        document.getElementById('progress-text').innerText = `${percentage}%`;
        document.getElementById('progress-stats').innerText = `${checked} de ${total} itens`;
    }

    document.addEventListener('DOMContentLoaded', renderChecklist);
</script>
</body></html>
