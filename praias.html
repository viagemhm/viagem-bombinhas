        let userLocation = { lat: -27.148, lng: -48.487 };
        let favoritas = JSON.parse(localStorage.getItem('fav_beaches') || '[]');
        let map, markerLayer;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userLocation.lat, userLocation.lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        function updateTheme() {
            const hour = new Date().getHours();
            const temp = 29; 
            const body = document.body;
            
            body.classList.remove('theme-hot', 'theme-cold', 'theme-night');
            
            if (hour >= 18 || hour <= 5) {
                body.classList.add('theme-night');
                document.getElementById('weather-icon').innerText = 'dark_mode';
            } else if (temp > 28) {
                body.classList.add('theme-hot');
                document.getElementById('weather-icon').innerText = 'sunny';
            } else if (temp < 20) {
                body.classList.add('theme-cold');
                document.getElementById('weather-icon').innerText = 'ac_unit';
            }
        }

        function updateCountdown() {
            const targetDate = new Date('2026-05-05T00:00:00');
            const now = new Date();
            const diff = targetDate - now;
            
            if (diff <= 0) {
                document.getElementById('countdown-text').innerText = "A viagem chegou!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById('countdown-text').innerText = `Faltam ${days}d ${hours}h ${mins}m`;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function toggleFavorite(id) {
            const index = favoritas.indexOf(id);
            if (index > -1) {
                favoritas.splice(index, 1);
            } else {
                favoritas.push(id);
            }
            localStorage.setItem('fav_beaches', JSON.stringify(favoritas));
            renderInterface();
        }

        function calcularScore(beach) {
            let score = 50;
            const dist = getDistance(userLocation.lat, userLocation.lng, beach.lat, beach.lng);
            score += Math.max(0, 30 - (dist * 5));
            if (favoritas.includes(beach.id)) score += 20;
            return Math.min(100, Math.round(score));
        }

        function renderInterface() {
            const ranked = beaches.map(b => ({
                ...b,
                match: calcularScore(b),
                distancia: getDistance(userLocation.lat, userLocation.lng, b.lat, b.lng).toFixed(1)
            })).sort((a, b) => b.match - a.match);
            
            // 1. Render Top Picks
            const recContainer = document.getElementById('recommendation-engine');
            recContainer.innerHTML = '';
            ranked.slice(0, 8).forEach((beach, i) => {
                const card = document.createElement('div');
                card.className = "min-w-[360px] h-56 rounded-[2.5rem] relative overflow-hidden group cursor-pointer border border-white/5 shadow-2xl shrink-0";
                card.innerHTML = `
                    <img alt="${beach.nome}" class="absolute inset-0 w-full h-full object-cover brightness-[0.45] group-hover:scale-110 transition-transform duration-[1.2s]" src="${beach.img}"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                    <div class="absolute top-6 left-6 bg-[var(--accent)] text-[#004c5e] text-[10px] font-black px-4 py-2 rounded-full shadow-lg">#${i+1} Match</div>
                    <div class="absolute bottom-8 left-8 right-8">
                        <p class="text-white font-extrabold text-2xl tracking-tight leading-tight">${beach.nome}</p>
                        <div class="flex items-center gap-4 mt-2">
                            <span class="text-[var(--accent)] font-black text-sm tracking-tight">${beach.match}% Match</span>
                            <span class="text-white/40 text-[11px] uppercase font-bold tracking-[0.2em]">• ${beach.distancia}km</span>
                        </div>
                    </div>
                `;
                recContainer.appendChild(card);
            });

            // 2. Render Full List
            const listContainer = document.getElementById('complete-beach-list');
            listContainer.innerHTML = '';
            beaches.forEach(beach => {
                const dist = getDistance(userLocation.lat, userLocation.lng, beach.lat, beach.lng).toFixed(1);
                const isFav = favoritas.includes(beach.id);
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-[2rem] flex flex-col justify-between hover:border-[var(--accent)]/30 transition-all";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center overflow-hidden">
                                <img src="${beach.img}" class="w-full h-full object-cover opacity-80" />
                            </div>
                            <button onclick="toggleFavorite(${beach.id})" class="w-10 h-10 rounded-full flex items-center justify-center ${isFav ? 'text-pink-500' : 'text-[#9eacbe]'} hover:bg-white/5 transition-colors">
                                <span class="material-symbols-outlined ${isFav ? 'filled' : ''}">${isFav ? 'favorite' : 'favorite_border'}</span>
                            </button>
                        </div>
                        <h4 class="text-xl font-bold text-[#d8e7fa] mb-1">${beach.nome}</h4>
                        <p class="text-xs text-[#9eacbe] font-medium mb-4 flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-md bg-white/5 uppercase tracking-wider text-[10px]">${beach.tipo}</span>
                            <span>• ${dist} km de você</span>
                        </p>
                        <p class="text-sm text-[#9eacbe] leading-relaxed mb-6">${beach.desc}</p>
                    </div>
                    <a href="${beach.maps}" target="_blank" class="w-full py-3 px-4 bg-white/5 hover:bg-[var(--accent)]/10 border border-white/10 rounded-xl text-center text-xs font-black uppercase tracking-widest text-[#d8e7fa] hover:text-[var(--accent)] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">directions</span> Como Chegar
                    </a>
                `;
                listContainer.appendChild(card);
            });

            // 3. Update Map Markers
            if (markerLayer) {
                markerLayer.clearLayers();
                beaches.forEach(beach => {
                    const beachScore = calcularScore(beach);
                    const color = beachScore > 85 ? '#00d2fd' : '#12273a';
                    const marker = L.circleMarker([beach.lat, beach.lng], {
                        radius: 8,
                        fillColor: color,
                        color: '#fff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(markerLayer);
                    marker.bindPopup(`
                        <div style="font-family: 'Plus Jakarta Sans', sans-serif;">
                            <b style="font-size: 14px; color: #12273a;">${beach.nome}</b><br/>
                            <span style="color: #666; font-size: 12px;">${beach.tipo}</span><br/>
                            <a href="${beach.maps}" target="_blank" style="display:inline-block; margin-top: 8px; color: #00d2fd; font-weight: 800; text-decoration: none; text-transform: uppercase; font-size: 10px;">Rota Google Maps</a>
                        </div>
                    `);
                });
            }
        }

        document.getElementById('next-rec').addEventListener('click', () => {
            document.getElementById('recommendation-engine').scrollBy({ left: 380, behavior: 'smooth' });
        });
        
        document.getElementById('prev-rec').addEventListener('click', () => {
            document.getElementById('recommendation-engine').scrollBy({ left: -380, behavior: 'smooth' });
        });

        document.getElementById('get-location-btn').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                    if (map) map.setView([userLocation.lat, userLocation.lng], 14);
                    renderInterface();
                }, () => {
                    alert("Não foi possível obter sua localização. Usando localização padrão.");
                });
            }
        });

        document.getElementById('zoom-in-btn').addEventListener('click', () => map.zoomIn());
        document.getElementById('zoom-out-btn').addEventListener('click', () => map.zoomOut());

        // Init
        updateTheme();
        updateCountdown();
        initMap();
        renderInterface();
        setInterval(updateCountdown, 1000);
        setInterval(updateTheme, 1000 * 60 * 15); // Recheck theme every 15 mins
    </script>
</body></html>
