<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0c0a09;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .container-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px 10px;

        .main-card {
            background: #1c1917;

            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);

        .thermal-cool { background: linear-gradient(135deg, #1e40af, #1e3a8a); border: 1px solid rgba(255, 255, 255, 0.2); }

        .glass-card {
            background: #292524;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);

        .no-scrollbar::-webkit-scrollbar { display: none; }

            background: rgba(255, 255, 255, 0.03);

        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .netflix-card:hover img {
            transform: scale(1.05);
        }
        .netflix-card img {
            transition: transform 0.5s ease;

            { id: 15, nome: "Praia Grossa", tipo: "Trilha", lat: -27.135, lng: -48.525, desc: "Praia selvagem com acesso via trilha íngreme partindo de Bombas. Recompensadora pela beleza intocada e isolamento total.", tag: "Trilha", img: "https://images.unsplash.com/photo-1509233725247-49e657c54213?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+Grossa" },
            { id: 16, nome: "Cardoso", tipo: "Calma", lat: -27.208, lng: -48.518, desc: "Vila de pescadores tradicional que mantém o charme do litoral catarinense antigo. Lugar ideal para comer peixe fresco.", tag: "Peixe Fresco", img: "https://images.unsplash.com/photo-1559827291-72ee739d0d9a?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+do+Cardoso" },
            { id: 17, nome: "Porto Belo", tipo: "Calma", lat: -27.158, lng: -48.544, desc: "Cidade vizinha com praia central calma, porto para navios de cruzeiro e águas cristalinas protegidas pela Ilha de Porto Belo.", tag: "Cais", img: "https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Porto+Belo" },
            { id: 18, nome: "Ilha de Porto Belo", tipo: "Trilha", lat: -27.142, lng: -48.537, desc: "Acesso por barco. Possui trilhas ecológicas, inscrições rupestres milenares e um museu, além de águas perfeitas para mergulho.", tag: "Ilha", img: "https://images.unsplash.com/photo-1533760881669-80db4d7b4c15?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Ilha+de+Porto+Belo" },
            { id: 19, nome: "Estaleiro", tipo: "Trilha", lat: -27.185, lng: -48.548, desc: "Praia deserta acessada por trilha a partir de Zimbros. Areias grossas e águas muito verdes, cercada de costões rochosos.", tag: "Rústica", img: "https://images.unsplash.com/photo-1520942702018-0862200e6873?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+do+Estaleiro" },
            { id: 20, nome: "Estaleirinho", tipo: "Trilha", lat: -27.187, lng: -48.550, desc: "Continuação isolada da praia do Estaleiro. Pequena faixa de areia em meio à mata preservada, ideal para quem busca silêncio.", tag: "Natureza", img: "https://images.unsplash.com/photo-1437719417032-8595fd9e9dc6?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+do+Estaleirinho" },

            { id: 22, nome: "Galheta", tipo: "Ondas", lat: -27.140, lng: -48.520, desc: "Pico de surf local próximo a Bombas. Mar agitado e ambiente frequentado principalmente por moradores e surfistas experientes.", tag: "Surf", img: "https://images.unsplash.com/photo-1502680390469-be75c86b636f?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+da+Galheta" },

            { id: 24, nome: "Perequê", tipo: "Ondas", lat: -27.155, lng: -48.580, desc: "Localizada no centro de Porto Belo. Praia extensa com boa infraestrutura, águas com ondas moderadas e fácil acesso.", tag: "Estrutura", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Praia+do+Perequê" },
            { id: 25, nome: "Baía de Zimbros", tipo: "Calma", lat: -27.200, lng: -48.545, desc: "Extensa baía de águas paradas como uma lagoa. Local perfeito para a prática de caiaque e stand-up paddle.", tag: "Espelho d'água", img: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&q=80&w=300", maps: "https://www.google.com/maps/dir/?api=1&destination=Baía+de+Zimbros" }
        ];

        let userLocation = { lat: -27.148, lng: -48.487 };
        let favorites = JSON.parse(localStorage.getItem('bombinhas_favs')) || [];
        let currentTemp = 25;
        let weatherCondition = 'clear';
        let windSpeed = 0;
        let map, markerLayer;

        // Obfuscated API Key Logic
        const _0x5f2a = ["8d904359489f", "688849b38069542a20ca"]; 
        const getK = () => _0x5f2a[0] + _0x5f2a[1];

        // Fetch Weather Data from OpenWeather
        async function fetchWeather() {
            const apiKey = getK(); 
            const lat = -27.14;
            const lon = -48.49;
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=pt_br`);
                if (!response.ok) throw new Error('Weather fetch failed');
                const data = await response.json();
                
                currentTemp = Math.round(data.main.temp);
                weatherCondition = data.weather[0].main.toLowerCase();
                windSpeed = Math.round(data.wind.speed * 3.6); // Convert m/s to km/h
                const desc = data.weather[0].description;
                const iconCode = data.weather[0].icon;

                updateWeatherUI(currentTemp, desc, windSpeed, iconCode);
                renderInterface(); 
            } catch (error) {
                console.error('Weather error:', error);
                // Fallback to static mock if API fails
                updateWeatherUI(28, "Céu limpo e ensolarado", 12, "01d");
                renderInterface();
            }
        }

        function updateWeatherUI(temp, desc, wind, icon) {
            document.getElementById('temp-val').textContent = `${temp}°C`;
            document.getElementById('weather-desc').textContent = desc.charAt(0).toUpperCase() + desc.slice(1);
            document.getElementById('wind-speed').textContent = `Vento: ${wind} km/h`;
            
            const climaBg = document.getElementById('clima-bg');
            const iconEl = document.getElementById('weather-icon');
            
            climaBg.classList.remove('thermal-hot', 'thermal-warm', 'thermal-mild', 'thermal-cool');
            if (temp >= 30) {
                climaBg.classList.add('thermal-hot');
                iconEl.textContent = 'wb_sunny';
            } else if (temp >= 24) {
                climaBg.classList.add('thermal-warm');
                iconEl.textContent = 'sunny';
            } else if (temp >= 18) {
                climaBg.classList.add('thermal-mild');
                iconEl.textContent = 'cloud';
            } else {
                climaBg.classList.add('thermal-cool');
                iconEl.textContent = 'ac_unit';
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userLocation.lat, userLocation.lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CARTO'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
            updateMapMarkers();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDist(km) {
            if (km < 1) return `${Math.round(km * 1000)}m`;
            return `${km.toFixed(1)}km`;
        }

        // IA Recommendation Algorithm
        function calculateScore(beach) {
            let score = 50;
            if (currentTemp >= 30) {
                if (beach.tipo === "Ondas") score += 30;
                if (beach.tag === "Snorkel") score += 15;
            } else if (currentTemp < 24) {
                if (beach.tipo === "Trilha") score += 35;
                if (beach.tipo === "Calma") score += 10;
            }
            if (windSpeed > 20 && beach.tipo === "Ondas") score += 20;
            const dist = getDistance(userLocation.lat, userLocation.lng, beach.lat, beach.lng);
            score += Math.max(0, 15 - (dist * 2.5));
            if (favorites.includes(beach.id)) score += 10;
            return Math.min(99, Math.round(score));
        }

        function getMatchLabel(score) {
            if (score >= 85) return "Match Perfeito";
            if (score >= 70) return "Ótima Escolha";
            return "Pode Gostar";
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('bombinhas_favs', JSON.stringify(favorites));
            renderInterface();
            updateMapMarkers();
        }

        function openMaps(url) {
            window.open(url, "_blank");
        }

        function focusOnBeach(lat, lng) {
            map.setView([lat, lng], 15);
            document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderInterface() {
            const ranked = beaches.map(b => ({
                ...b,
                score: calculateScore(b),
                dist: getDistance(userLocation.lat, userLocation.lng, b.lat, b.lng),
                isFav: favorites.includes(b.id)
            })).sort((a, b) => b.score - a.score);

            // Recommendation Engine (Netflix Style)
            const recContainer = document.getElementById('recommendation-engine');
            recContainer.innerHTML = '';
            ranked.slice(0, 6).forEach(beach => {
                const card = document.createElement('div');
                card.className = "netflix-card min-w-[160px] h-36 rounded-2xl relative overflow-hidden shrink-0 border border-white/10 shadow-xl cursor-pointer";
                card.onclick = () => focusOnBeach(beach.lat, beach.lng);
                card.innerHTML = `
                    <img class="absolute inset-0 w-full h-full object-cover brightness-[0.6]" src="${beach.img}"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-3 flex flex-col justify-between">
                        <div class="bg-amber-500 text-black text-[8px] font-black px-1.5 py-0.5 rounded-sm self-start uppercase tracking-tighter">${getMatchLabel(beach.score)}</div>
                        <div>
                            <p class="text-[11px] font-extrabold text-white leading-tight truncate">${beach.nome}</p>
                            <div class="flex items-center gap-1">
                                 <span class="text-[9px] text-amber-400 font-bold">${beach.score}% Match</span>
                            </div>
                        </div>
                    </div>
                `;
                recContainer.appendChild(card);
            });

            // Detailed List
            const listContainer = document.getElementById('complete-beach-list');
            listContainer.innerHTML = '';
            ranked.forEach(beach => {
                const item = document.createElement('div');
                item.className = "beach-list-item flex flex-col gap-3 group hover:bg-white/5";
                item.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex gap-3 flex-1">
                            <button class="shrink-0 mt-1 flex flex-col items-center gap-0.5" onclick="toggleFavorite(${beach.id})">
                                <span class="material-symbols-outlined text-[24px] ${beach.isFav ? 'text-orange-500' : 'text-stone-600'}" style="font-variation-settings: 'FILL' ${beach.isFav ? 1 : 0}">favorite</span>
                                <span class="text-[7px] font-black uppercase text-stone-500">${beach.isFav ? 'Salvo' : 'Salvar'}</span>
                            </button>
                            <div class="flex-1 cursor-pointer" onclick="focusOnBeach(${beach.lat}, ${beach.lng})">
                                <h4 class="font-bold text-white text-sm">${beach.nome}</h4>
                                <p class="text-[9px] text-amber-500/80 font-bold uppercase tracking-widest mt-0.5">
                                    ${beach.tipo} • ${formatDist(beach.dist)} DE VOCÊ
                                </p>
                            </div>
                        </div>
                        <button class="w-10 h-10 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-amber-500 hover:bg-amber-500 transition-all hover:text-white" onclick="openMaps('${beach.maps}')">
                            <span class="material-symbols-outlined text-[18px]">location_on</span>
                        </button>
                    </div>
                    <p class="text-[10px] text-stone-400 leading-relaxed">${beach.desc}</p>
                `;
                listContainer.appendChild(item);
            });
        }

        function updateMapMarkers() {
            if (!markerLayer) return;
            markerLayer.clearLayers();
            beaches.forEach(beach => {
                const isFav = favorites.includes(beach.id);
                const color = isFav ? '#f97316' : '#f59e0b';
                L.circleMarker([beach.lat, beach.lng], {
                    radius: isFav ? 9 : 7,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                }).addTo(markerLayer).bindPopup(`<b style="color:#000">${beach.nome}</b>`);
            });
        }

        // Geolocation Support
        document.getElementById('get-location-btn').addEventListener('click', () => {
            const btn = document.getElementById('get-location-btn');
            const text = document.getElementById('loc-text');
            const icon = document.getElementById('loc-icon');

            if (navigator.geolocation) {
                btn.disabled = true;
                text.textContent = "Buscando GPS...";
                icon.classList.add('loading-pulse');

                navigator.geolocation.getCurrentPosition(
                    p => {
                        userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
                        map.setView([userLocation.lat, userLocation.lng], 14);
                        text.textContent = "Localizado ✓";
                        icon.textContent = "check_circle";
                        icon.classList.remove('loading-pulse');
                        renderInterface();
                        setTimeout(() => {
                            btn.disabled = false;
                            text.textContent = "Minha Localização";
                            icon.textContent = "my_location";
                        }, 3000);
                    },
                    err => {
                        text.textContent = "Erro de GPS";
                        icon.textContent = "error";
                        btn.disabled = false;
                    }
                );
            }
        });

        // Netflix-style Navigation
        document.getElementById('next-rec').onclick = () => document.getElementById('recommendation-engine').scrollBy({ left: 180, behavior: 'smooth' });
        document.getElementById('prev-rec').onclick = () => document.getElementById('recommendation-engine').scrollBy({ left: -180, behavior: 'smooth' });

        // Back Button
        document.getElementById('btn-back').onclick = () => {
            if (window.history.length > 1) window.history.back();
            else window.location.href = '#';
        };

        // Countdown Logic
        const targetDate = new Date('2026-01-01T00:00:00');
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 0) {
                document.getElementById('countdown-label').textContent = `Faltam ${days} dias • Bombinhas 2026`;
            }
        }

        // Initialize
        fetchWeather();
        initMap();
        renderInterface();
        updateCountdown();
    </script>
</body></html>
