<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bombinhas Lume - Explorar Praias</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
    <link crossorigin="" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" rel="stylesheet"/>
    <script crossorigin="" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --accent-color: #06b6d4;
            --accent-gradient: linear-gradient(135deg, #0891b2, #0e7490);
            --card-glow: rgba(6, 182, 212, 0.05);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }
        .container-wrapper { width: 100%; max-width: 420px; padding: 20px 10px; }
        .main-card {
            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px var(--card-glow);
        }
        
        /* Temas Dinâmicos */
        .theme-hot { --accent-color: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c); --card-glow: rgba(249,115,22,0.1); }
        .theme-warm { --accent-color: #eab308; --accent-gradient: linear-gradient(135deg, #eab308, #ca8a04); --card-glow: rgba(234,179,8,0.1); }
        .theme-fresh { --accent-color: #38bdf8; --accent-gradient: linear-gradient(135deg, #38bdf8, #0ea5e9); --card-glow: rgba(56,189,248,0.1); }
        .theme-cool { --accent-color: #3b82f6; --accent-gradient: linear-gradient(135deg, #1e3a8a, #1e40af); --card-glow: rgba(59,130,246,0.1); }

        .glass-card {
            background: rgba(30,41,59,0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .dynamic-accent-text { color: var(--accent-color); }
        .dynamic-accent-bg { background: var(--accent-color); }
        .dynamic-accent-gradient { background: var(--accent-gradient); }
        
        .beach-list-item {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px;
            margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .beach-list-item.visitada { opacity: 0.4; filter: grayscale(1); border-left: 4px solid #4caf50; }
        
        #map { height: 280px; border-radius: 24px; z-index: 1; filter: grayscale(0.2) contrast(1.1); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .back-btn { color: #94a3b8; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .back-btn:hover { color: var(--accent-color); transform: translateX(-3px); }

        #weather-icon { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body id="body-theme">

<div class="container-wrapper">
    <div class="w-full flex justify-start mb-4">
        <button class="back-btn flex items-center gap-2" onclick="window.location.href='index.html'">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            VOLTAR AO INÍCIO
        </button>
    </div>

    <div class="main-card">
        <div class="flex justify-between items-start mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full p-0.5 dynamic-accent-gradient">
                    <img class="w-full h-full rounded-full object-cover bg-gray-800" 
                         src="https://i.ibb.co/cpfKB8d/4-de-abr-de-2026-11-11-40.png"/>
                </div>
                <div>
                    <h2 class="font-bold text-white text-sm leading-tight">Helder e Mayara</h2>
                    <div class="text-[10px] font-bold dynamic-accent-text uppercase tracking-tight">Bombinhas 2026</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Viagem</div>
                <div class="text-xs font-bold text-slate-300">05/05/2026</div>
                <div class="text-[10px] dynamic-accent-text font-bold mt-0.5" id="countdown">Carregando...</div>
            </div>
        </div>

        <div class="glass-card mb-6" style="min-height: 110px;">
            <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-40 brightness-50">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-slow-motion-of-gentle-waves-on-the-shore-1577-large.mp4" type="video/mp4">
            </video>
            
            <div class="relative z-10 flex justify-between items-center h-full">
                <div>
                    <div class="text-xl font-extrabold tracking-tighter text-white drop-shadow-lg">Explorar Praias</div>
                    <div class="text-[10px] text-cyan-200 font-black uppercase tracking-widest drop-shadow-md" id="weather-desc">Sincronizando...</div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-black text-white tracking-tighter drop-shadow-lg" id="temp-val">--°C</div>
                    <span class="material-symbols-outlined dynamic-accent-text text-3xl drop-shadow-lg" id="weather-icon">wb_sunny</span>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6">
            <button onclick="filtrar('Todos', this)" class="px-5 py-2.5 rounded-2xl bg-white/10 text-white text-[10px] font-black uppercase whitespace-nowrap filter-btn dynamic-accent-bg">Todos</button>
            <button onclick="filtrar('Mar Calmo', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🌊 Mar Calmo</button>
            <button onclick="filtrar('Com Ondas', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🏄 Ondas</button>
            <button onclick="filtrar('Trilhas', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🥾 Trilhas</button>
        </div>

        <button id="btn-gps" onclick="ativarGPS()" class="w-full mb-8 py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:bg-white/10 transition-all group">
            <span class="material-symbols-outlined text-sm dynamic-accent-text group-hover:scale-125 transition-transform">my_location</span>
            <span id="txt-gps">Ordenar por Proximidade</span>
        </button>

        <div id="lista-praias"></div>
    </div>

    <footer class="mt-8 text-slate-600 text-[10px] font-bold uppercase tracking-widest text-center pb-10">
        Nossas Pegadas © 2026
    </footer>
</div>

<script src="praias-db.js"></script>

<script>
    let userLat = null, userLng = null, categoriaAtual = 'Todos', map, markerLayer;
    let favoritos = JSON.parse(localStorage.getItem('favs')) || [];
    let visitados = JSON.parse(localStorage.getItem('vis')) || [];

    async function updateWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=-27.148&lon=-48.487&appid=cc78026071390eea9efc3ebf84f27bcd&units=metric&lang=pt_br`);
            const data = await res.json();
            if (data.main) {
                const temp = Math.round(data.main.temp);
                document.getElementById('temp-val').textContent = `${temp}°C`;
                document.getElementById('weather-desc').textContent = data.weather[0].description;
                applyDynamicTheme(temp);
            }
        } catch (e) { applyDynamicTheme(25); }
    }

    function applyDynamicTheme(temp) {
        const body = document.getElementById('body-theme');
        const iconEl = document.getElementById('weather-icon');
        body.classList.remove('theme-hot','theme-warm','theme-fresh','theme-cool');
        if (temp >= 30) { body.classList.add('theme-hot'); iconEl.textContent = 'sunny'; }
        else if (temp >= 25) { body.classList.add('theme-warm'); iconEl.textContent = 'wb_sunny'; }
        else if (temp >= 20) { body.classList.add('theme-fresh'); iconEl.textContent = 'cloud_queue'; }
        else { body.classList.add('theme-cool'); iconEl.textContent = 'ac_unit'; }
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([-27.148, -48.487], 13);
        L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png').addTo(map);
        markerLayer = L.layerGroup().addTo(map);
        renderizar();
    }

    function renderizar() {
        const container = document.getElementById('lista-praias');
        container.innerHTML = '';
        markerLayer.clearLayers();

        let lista = categoriaAtual === 'Todos' ? [...locaisBombinhas] : locaisBombinhas.filter(l => l.cat === categoriaAtual);

        if (userLat && userLng) {
            lista.forEach(l => l.dist = haversine(userLat, userLng, l.lat, l.lng));
            lista.sort((a, b) => a.dist - b.dist);
        }

        lista.forEach(local => {
            const isFav = favoritos.includes(local.nome);
            const isVis = visitados.includes(local.nome);
            const card = document.createElement('div');
            card.className = `beach-list-item ${isVis ? 'visitada' : ''}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <h3 class="text-white font-bold text-sm tracking-tight">${local.nome}</h3>
                        <p class="text-[9px] dynamic-accent-text font-black uppercase tracking-tighter">
                            ${local.cat} • ${local.dist ? local.dist + ' KM' : '--- KM'}
                        </p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="toggleFav('${local.nome}')" class="${isFav ? 'text-red-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isFav ? 1 : 0}">favorite</span>
                        </button>
                        <button onclick="toggleVis('${local.nome}')" class="${isVis ? 'text-green-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isVis ? 1 : 0}">check_circle</span>
                        </button>
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-4">${local.desc}</p>
                <a href="${local.maps}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-white/5 border border-white/10 rounded-xl text-white text-[10px] font-black uppercase hover:bg-white/10 transition-all">
                    <span class="material-symbols-outlined text-xs dynamic-accent-text">directions</span> Traçar Rota
                </a>
            `;
            container.appendChild(card);
            L.circleMarker([local.lat, local.lng], { radius: 6, fillColor: isFav ? '#ef4444' : '#06b6d4', color: '#fff', weight: 1.5, fillOpacity: 1 }).addTo(markerLayer).bindPopup(local.nome);
        });
    }

    function ativarGPS() {
        const txt = document.getElementById('txt-gps');
        txt.innerText = "Sincronizando GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLng = pos.coords.longitude;
            txt.innerText = "Ordenado por Proximidade";
            renderizar();
            map.flyTo([userLat, userLng], 14);
        }, () => txt.innerText = "Erro ao localizar");
    }

    function toggleFav(n) {
        favoritos.includes(n) ? favoritos = favoritos.filter(i => i !== n) : favoritos.push(n);
        localStorage.setItem('favs', JSON.stringify(favoritos));
        renderizar();
    }

    function toggleVis(n) {
        visitados.includes(n) ? visitados = visitados.filter(i => i !== n) : visitados.push(n);
        localStorage.setItem('vis', JSON.stringify(visitados));
        renderizar();
    }

    function filtrar(cat, btn) {
        categoriaAtual = cat;
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-white/10', 'text-white', 'dynamic-accent-bg');
            b.classList.add('bg-white/5', 'text-slate-400');
        });
        btn.classList.remove('bg-white/5', 'text-slate-400');
        btn.classList.add('bg-white/10', 'text-white', 'dynamic-accent-bg');
        renderizar();
    }

    function updateCountdown() {
        const diff = new Date(2026, 4, 5) - new Date();
        if (diff <= 0) { document.getElementById('countdown').textContent = "Aproveite!"; return; }
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
        document.getElementById('countdown').textContent = `Faltam ${d}d ${h}h`;
    }

    updateCountdown();
    updateWeather();
    initMap();
    setInterval(updateCountdown, 3600000);
    setInterval(updateWeather, 1800000);
</script>
</body>
</html>
