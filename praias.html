<style>

            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px var(--card-glow);
            position: relative;
        }

        /* Dynamic Theme Classes */
        .theme-hot { --accent-color: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c); --card-glow: rgba(249, 115, 22, 0.1); }
        .theme-warm { --accent-color: #eab308; --accent-gradient: linear-gradient(135deg, #eab308, #ca8a04); --card-glow: rgba(234, 179, 8, 0.1); }
        .theme-fresh { --accent-color: #38bdf8; --accent-gradient: linear-gradient(135deg, #38bdf8, #0ea5e9); --card-glow: rgba(56, 189, 248, 0.1); }
        .theme-cool { --accent-color: #3b82f6; --accent-gradient: linear-gradient(135deg, #1e3a8a, #1e40af); --card-glow: rgba(59, 130, 246, 0.1); }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .dynamic-accent-text { color: var(--accent-color); transition: color 0.3s ease; }
        .dynamic-accent-bg { background: var(--accent-color); transition: background 0.3s ease; }
        .dynamic-accent-gradient { background: var(--accent-gradient); transition: background 0.3s ease; }
        .dynamic-accent-border { border-color: var(--accent-color); transition: border-color 0.3s ease; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .beach-list-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        #map { height: 300px; border-radius: 20px; z-index: 1; filter: grayscale(0.2) contrast(1.1); }
        footer { margin-top: 24px; color: #64748b; font-size: 12px; font-weight: 500; text-align: center; padding-bottom: 20px; }

        .loading-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;

        .best-now-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: var(--accent-gradient);
        }

    async function updateWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=-27.148&lon=-48.487&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=pt_br`);
            const data = await res.json();
            if (data.main) {
                currentTemp = Math.round(data.main.temp);
                document.getElementById('temp-val').textContent = `${currentTemp}°C`;
                document.getElementById('weather-desc').textContent = data.weather[0].description.charAt(0).toUpperCase() + data.weather[0].description.slice(1);
                applyDynamicTheme(currentTemp);
                updateBestBeachNow();
                renderInterface();
            }
        } catch (e) {
            console.error("Erro clima:", e);
            applyDynamicTheme(25);
            updateBestBeachNow();
            renderInterface();
        }
    }

        const iconEl = document.getElementById('weather-icon');
        const hour = new Date().getHours();
        const isNight = hour >= 18 || hour < 6;

        body.classList.remove('theme-hot', 'theme-warm', 'theme-fresh', 'theme-cool');

        if (isNight) {
            body.classList.add('theme-cool');
            iconEl.textContent = 'dark_mode';
        } else if (temp >= 30) {
            body.classList.add('theme-hot');
            iconEl.textContent = 'sunny';
        } else if (temp >= 25) {
            body.classList.add('theme-warm');
            iconEl.textContent = 'wb_sunny';
        } else if (temp >= 20) {
            body.classList.add('theme-fresh');
            iconEl.textContent = 'cloud_queue';
        } else {
            body.classList.add('theme-cool');
            iconEl.textContent = 'ac_unit';
        }
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([userLocation.lat, userLocation.lng], 13);
        L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
            attribution: '© Stadia Maps'
        }).addTo(map);
        markerLayer = L.layerGroup().addTo(map);
        updateMapMarkers();
        setTimeout(() => map.invalidateSize(), 300);
    }

    function updateMapMarkers() {
        if (!markerLayer) return;
        markerLayer.clearLayers();
        const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
        
        beaches.forEach((beach, i) => {
            const isFav = favoritas[i];
            L.circleMarker([beach.lat, beach.lng], {
                radius: isFav ? 8 : 5, 
                fillColor: isFav ? '#ef4444' : accentColor, 
                color: '#fff', 
                weight: 1.5, 
                opacity: 1, 
                fillOpacity: 0.9
            }).addTo(markerLayer).bindPopup(`<b style="color:#1e293b">${beach.nome}</b>`);
        });

        if (userLocation && map) {
            const userIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/64/64113.png',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([userLocation.lat, userLocation.lng], { icon: userIcon }).addTo(map);
        }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calcularScore(beach) {
        let score = 50;
        const dist = getDistance(userLocation.lat, userLocation.lng, beach.lat, beach.lng);
        score += Math.max(0, 30 - (dist * 4));
        
        // Dynamic factors
        if (currentTemp >= 30 && beach.tipo === 'Ondas') score += 15;
        if (currentTemp < 25 && beach.tipo === 'Calma') score += 10;
        if (favoritas[beaches.indexOf(beach)]) score += 20;

        return Math.min(100, Math.round(score));
    }

    function updateBestBeachNow() {
        const best = beaches.map((b, i) => ({ ...b, score: calcularScore(b), dist: getDistance(userLocation.lat, userLocation.lng, b.lat, b.lng) }))
                           .sort((a,b) => b.score - a.score)[0];
        
        const container = document.getElementById('best-now');
        const content = document.getElementById('best-now-content');

        if (best) {
            container.style.display = 'block';
            content.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl overflow-hidden border border-white/10">
                        <img src="${best.img}" class="w-full h-full object-cover" onerror="this.src='${FALLBACK_IMG}'">
                    </div>
                    <div>
                        <div class="text-white font-bold text-sm leading-tight">${best.nome}</div>
                        <div class="dynamic-accent-text font-bold text-[9px] uppercase tracking-wide">
                            ${best.tipo} • ${formatDist(best.dist)}
                        </div>
                    </div>
                </div>
                <button onclick="focusOnBeach(${best.lat}, ${best.lng})" class="dynamic-accent-bg text-slate-950 px-3 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-1 active:scale-95 transition-transform">
                    Explorar <span class="material-symbols-outlined text-xs">arrow_forward</span>
                </button>
            `;
        }
    }

    function formatDist(km) { return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`; }

    function renderInterface() {
        const ranked = beaches.map((b, i) => ({
            ...b,
            match: calcularScore(b),
            dist: getDistance(userLocation.lat, userLocation.lng, b.lat, b.lng),
            fav: favoritas[i],
            originalIdx: i
        })).sort((a, b) => b.match - a.match);
        
        const recContainer = document.getElementById('recommendation-engine');
        recContainer.innerHTML = '';
        ranked.slice(0, 6).forEach((beach, i) => {
            const card = document.createElement('div');
            card.className = "min-w-[150px] h-32 rounded-xl relative overflow-hidden shrink-0 border border-white/5 shadow-lg cursor-pointer transition-transform active:scale-95";
            card.onclick = () => focusOnBeach(beach.lat, beach.lng);
            card.innerHTML = `
                <img class="absolute inset-0 w-full h-full object-cover brightness-[0.4]" src="${beach.img}" onerror="this.src='${FALLBACK_IMG}'"/>
                <div class="absolute inset-0 p-3 flex flex-col justify-between">
                    <div class="dynamic-accent-bg text-slate-950 text-[8px] font-black px-2 py-0.5 rounded-full self-start shadow-sm">#${i+1} IA MATCH</div>
                    <div class="drop-shadow-md">
                        <p class="text-[11px] font-extrabold text-white leading-tight truncate">${beach.nome}</p>
                        <p class="text-[8px] dynamic-accent-text font-bold uppercase mt-0.5">${beach.match}% compatível</p>
                    </div>
                </div>
            `;
            recContainer.appendChild(card);
        });

        const listContainer = document.getElementById('complete-beach-list');
        listContainer.innerHTML = '';
        ranked.forEach(beach => {
            const item = document.createElement('div');
            item.className = "beach-list-item flex flex-col gap-3";
            item.innerHTML = `
                <div class="flex items-start justify-between gap-2">
                    <div class="flex items-start gap-3 flex-1 overflow-hidden" onclick="focusOnBeach(${beach.lat}, ${beach.lng})">
                        <button class="fav-btn mt-0.5 flex flex-col items-center justify-center shrink-0 min-w-[40px]" onclick="event.stopPropagation(); toggleFavorite(${beach.originalIdx})">
                            <span class="material-symbols-outlined text-[24px] ${beach.fav ? 'text-red-500' : 'text-slate-500'}" style="font-variation-settings: 'FILL' ${beach.fav ? 1 : 0}">favorite</span>
                            <span class="text-[8px] font-bold uppercase mt-1 ${beach.fav ? 'text-red-500' : 'text-slate-500'}">${beach.fav ? 'Favorito' : 'Salvar'}</span>
                        </button>
                        <div class="flex-1 overflow-hidden">
                            <p class="font-bold text-slate-100 text-sm leading-tight truncate">${beach.nome}</p>
                            <p class="text-[10px] dynamic-accent-text font-medium mt-0.5 uppercase tracking-wide truncate">
                                ${beach.tipo.toUpperCase()} • ${formatDist(beach.dist)}
                            </p>
                        </div>
                    </div>
                    <button class="px-3 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center gap-1 text-slate-400 hover:dynamic-accent-text hover:dynamic-accent-border transition-all" onclick="window.open('${beach.maps}', '_blank')">
                        <span class="material-symbols-outlined text-[18px]">location_on</span>
                    </button>
                </div>
                <p class="text-[11px] text-slate-400 leading-relaxed px-1">${beach.desc}</p>
            `;
            listContainer.appendChild(item);
        });
        updateMapMarkers();
    }

    function toggleFavorite(idx) {
        favoritas[idx] = !favoritas[idx];
        localStorage.setItem('praias_fav_v1', JSON.stringify(favoritas));
        renderInterface();
        updateBestBeachNow();
    }

    function focusOnBeach(lat, lng) {
        map.flyTo([lat, lng], 15, { animate: true, duration: 1 });
        document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateCountdown() {
        const targetDate = new Date(2026, 4, 5);
        const diff = targetDate - new Date();
        const el = document.getElementById('countdown');
        if (diff <= 0) { el.textContent = "Aproveite!"; return; }
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        el.textContent = `Faltam ${days}d ${hours}h ${mins}m`;
    }

    document.getElementById('get-location-btn').addEventListener('click', function() {
        const btn = this;
        const txt = document.getElementById('loc-text');
        const icon = document.getElementById('loc-icon');
        if (navigator.geolocation) {
            btn.disabled = true;
            txt.textContent = "Buscando...";
            icon.classList.add('loading-pulse');
            navigator.geolocation.getCurrentPosition(p => {
                userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
                map.setView([userLocation.lat, userLocation.lng], 14);
                txt.textContent = "Localizado!";
                icon.textContent = "check_circle";
                icon.classList.remove('loading-pulse');
                renderInterface();
                updateBestBeachNow();
                setTimeout(() => { btn.disabled = false; txt.textContent = "Minha Localização"; icon.textContent = "my_location"; }, 3000);
            }, () => {
                txt.textContent = "Erro GPS";
                btn.disabled = false;
                icon.classList.remove('loading-pulse');
            });
        }
    });

    document.getElementById('next-rec').onclick = () => document.getElementById('recommendation-engine').scrollBy({ left: 160, behavior: 'smooth' });
    document.getElementById('prev-rec').onclick = () => document.getElementById('recommendation-engine').scrollBy({ left: -160, behavior: 'smooth' });
    document.getElementById('btn-back').onclick = () => window.location.href = 'index.html';

    // Init
    updateCountdown();
    updateWeather();
    initMap();
    setInterval(updateCountdown, 60000);
    setInterval(updateWeather, 1800000); // 30 min
</script>
</body></html>
