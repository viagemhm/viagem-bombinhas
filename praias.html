<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bombinhas Lume - Explorar Praias</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <link crossorigin="" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" rel="stylesheet"/>
    <script crossorigin="" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* VARIÁVEIS DINÂMICAS (IGUAL À INDEX) */
        :root { 
            --theme-color: #f97316; 
            --theme-bg-light: rgba(249, 115, 22, 0.1); 
            --theme-border: rgba(249, 115, 22, 0.3);
            --theme-border-strong: rgba(249, 115, 22, 0.5);
        }

        .text-theme { color: var(--theme-color); transition: color 0.5s ease; }
        .bg-theme-light { background-color: var(--theme-bg-light); transition: background-color 0.5s ease; }
        .border-theme { border-color: var(--theme-border); transition: border-color 0.5s ease; }
        .border-theme-strong { border-color: var(--theme-border-strong); transition: border-color 0.5s ease; }
        .bg-theme { background-color: var(--theme-color); transition: background-color 0.5s ease; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; margin: 0; padding: 20px 10px; color: #f8fafc; min-height: 100vh; }
        .container { background: #0f0f0f; width: 100%; max-width: 420px; border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); margin: auto; }
        
        #map { height: 250px; border-radius: 24px; z-index: 1; filter: grayscale(0.2) contrast(1.1); margin: 0 16px 20px 16px; border: 1px solid var(--theme-border); }
        .beach-list-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .beach-list-item.visitada { opacity: 0.4; filter: grayscale(1); border-left: 4px solid #4caf50; }
        
        .filter-btn { transition: all 0.3s ease; }
        .active-filter { background-color: var(--theme-color) !important; color: #000 !important; font-weight: 800; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .back-btn { color: #94a3b8; font-size: 13px; font-weight: 700; transition: color 0.3s; background: none; border: none; cursor: pointer; padding: 0; text-transform: uppercase; }
        .back-btn:hover { color: var(--theme-color); }
    </style>
</head>
<body id="body-theme">

<div class="container">
    <div class="p-4">
        <button onclick="window.location.href='index.html'" class="back-btn flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            VOLTAR AO INÍCIO
        </button>
    </div>

    <div class="profile-header border-theme-strong" style="height: 150px; background-image: url('https://i.ibb.co/j9xkVr6N/Afaste-a-imagem-202604072042.jpg'); background-size: cover; background-position: center; border-bottom-width: 6px; position: relative;">
        <div style="position: absolute; bottom: -35px; left: 24px; width: 80px; height: 80px; border: 4px solid #0f0f0f; border-radius: 50%; overflow: hidden; background: #222;">
            <img src="https://i.ibb.co/s9WK610w/Crie-uma-imagem-202604072021.jpg" class="w-full h-full object-cover">
        </div>
    </div>

    <div style="padding: 45px 24px 10px; display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h2 class="font-bold text-xl text-white">Helder e Mayara</h2>
            <div class="text-[11px] font-bold uppercase tracking-widest text-theme">Explorar • Bombinhas</div>
        </div>
        <div class="text-right">
            <div id="temp-atual" class="text-2xl font-black text-white">--°C</div>
            <div id="weather-desc" class="text-[9px] font-bold text-theme uppercase tracking-tighter">Sincronizando...</div>
        </div>
    </div>

    <div id="map" class="mt-6"></div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-6">
        <button onclick="filtrar('Todos', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn active-filter">Todos</button>
        <button onclick="filtrar('Mar Calmo', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🌊 Mar Calmo</button>
        <button onclick="filtrar('Com Ondas', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🏄 Ondas</button>
        <button onclick="filtrar('Trilhas', this)" class="px-5 py-2.5 rounded-2xl bg-white/5 text-slate-400 text-[10px] font-black uppercase whitespace-nowrap filter-btn">🥾 Trilhas</button>
    </div>

    <div class="px-4 mb-8">
        <button id="btn-gps" onclick="ativarGPS()" class="w-full py-4 rounded-2xl bg-white/5 border border-theme text-white font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
            <span class="material-symbols-outlined text-sm text-theme">my_location</span>
            <span id="txt-gps">Ordenar por Proximidade</span>
        </button>
    </div>

    <div id="lista-praias" class="px-4 pb-10"></div>
</div>

<footer class="mt-8 text-slate-600 text-[10px] font-bold uppercase tracking-widest text-center pb-10">
    Nossas Pegadas © 2026
</footer>

<script src="praias-db.js"></script>

<script>
    const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
    // Coordenadas centrais de Bombinhas (Av. Ver. Manoel José dos Santos)
    const centroBombinhasLat = -27.148;
    const centroBombinhasLng = -48.487;
    
    let userLat = null, userLng = null, categoriaAtual = 'Todos', map, markerLayer;
    let favoritos = JSON.parse(localStorage.getItem('favs')) || [];
    let visitados = JSON.parse(localStorage.getItem('vis')) || [];

    // MOTOR DE CORES (IDENTICO À INDEX)
    function applyDynamicColors(timestampAtual, sunriseTs, sunsetTs) {
        const root = document.documentElement;
        const isNight = timestampAtual < sunriseTs || timestampAtual > sunsetTs;
        if (isNight) {
            root.style.setProperty('--theme-color', '#3b82f6'); 
            root.style.setProperty('--theme-bg-light', 'rgba(59, 130, 246, 0.1)');
            root.style.setProperty('--theme-border', 'rgba(59, 130, 246, 0.3)');
            root.style.setProperty('--theme-border-strong', 'rgba(59, 130, 246, 0.6)');
        } else {
            root.style.setProperty('--theme-color', '#f97316');
            root.style.setProperty('--theme-bg-light', 'rgba(249, 115, 22, 0.1)');
            root.style.setProperty('--theme-border', 'rgba(249, 115, 22, 0.3)');
            root.style.setProperty('--theme-border-strong', 'rgba(249, 115, 22, 0.6)');
        }
    }

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${centroBombinhasLat}&lon=${centroBombinhasLng}&appid=${API_KEY}&units=metric&lang=pt_br`);
            const data = await res.json();
            applyDynamicColors(data.dt, data.sys.sunrise, data.sys.sunset);
            document.getElementById('temp-atual').innerText = Math.round(data.main.temp) + "°C";
            document.getElementById('weather-desc').innerText = data.weather[0].description;
        } catch (e) {}
    }

    function initMap() {
        // Inicializa o mapa com o controle de atribuição desativado para melhor visualização mobile
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([centroBombinhasLat, centroBombinhasLng], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        markerLayer = L.layerGroup().addTo(map);
        
        // CORREÇÃO DO INVALID SIZE: Espera a página e a div do mapa estarem prontas
        setTimeout(() => {
            map.invalidateSize();
            renderizar();
        }, 500);
    }

    function renderizar() {
        const container = document.getElementById('lista-praias');
        container.innerHTML = '';
        if(markerLayer) markerLayer.clearLayers();

        let lista = categoriaAtual === 'Todos' ? [...locaisBombinhas] : locaisBombinhas.filter(l => l.cat === categoriaAtual);

        // Calcula distância baseada no GPS do usuário, OU do centro de Bombinhas
        const latReferencia = userLat || centroBombinhasLat;
        const lngReferencia = userLng || centroBombinhasLng;

        lista.forEach(l => {
            l.distCalculada = haversine(latReferencia, lngReferencia, l.lat, l.lng);
        });
        
        // Só ordena se o usuário tiver ativado o GPS
        if (userLat && userLng) {
            lista.sort((a, b) => a.distCalculada - b.distCalculada);
        }

        lista.forEach(local => {
            const isFav = favoritos.includes(local.nome);
            const isVis = visitados.includes(local.nome);
            const card = document.createElement('div');
            card.className = `beach-list-item ${isVis ? 'visitada' : ''}`;
            
            // Define o prefixo dependendo se é a distância real ou estimada do centro
            const distPrefix = userLat ? '' : 'Aprox. ';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <h3 class="text-white font-bold text-sm tracking-tight">${local.nome}</h3>
                        <p class="text-[9px] text-theme font-black uppercase tracking-tighter">
                            ${local.cat} • ${distPrefix}${local.distCalculada} KM
                        </p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="toggleFav('${local.nome}')" class="${isFav ? 'text-red-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isFav ? 1 : 0}">favorite</span>
                        </button>
                        <button onclick="toggleVis('${local.nome}')" class="${isVis ? 'text-green-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isVis ? 1 : 0}">check_circle</span>
                        </button>
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-4">${local.desc}</p>
                <a href="${local.maps}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-white/5 border border-theme rounded-xl text-white text-[10px] font-black uppercase hover:bg-white/10 transition-all">
                    <span class="material-symbols-outlined text-xs text-theme">directions</span> Traçar Rota
                </a>
            `;
            container.appendChild(card);
            
            if(markerLayer) {
                L.circleMarker([local.lat, local.lng], { radius: 6, fillColor: isFav ? '#ef4444' : '#06b6d4', color: '#fff', weight: 1.5, fillOpacity: 1 }).addTo(markerLayer).bindPopup(local.nome);
            }
        });
    }

    function ativarGPS() {
        const txt = document.getElementById('txt-gps');
        txt.innerText = "Sincronizando GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLng = pos.coords.longitude;
            txt.innerText = "Mais próximas primeiro";
            renderizar();
            map.flyTo([userLat, userLng], 14);
        }, () => txt.innerText = "Erro GPS");
    }

    function toggleFav(n) {
        favoritos.includes(n) ? favoritos = favoritos.filter(i => i !== n) : favoritos.push(n);
        localStorage.setItem('favs', JSON.stringify(favoritos));
        renderizar();
    }

    function toggleVis(n) {
        visitados.includes(n) ? visitados = visitados.filter(i => i !== n) : visitados.push(n);
        localStorage.setItem('vis', JSON.stringify(visitados));
        renderizar();
    }

    function filtrar(cat, btn) {
        categoriaAtual = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
        btn.classList.add('active-filter');
        renderizar();
    }

    // Usando event listener para garantir que a DOM está pronta
    window.addEventListener('load', () => { 
        fetchWeather(); 
        initMap(); 
    });
</script>
</body>
</html>
