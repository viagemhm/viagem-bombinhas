<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bombinhas Lume - Explorar Praias</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    
    <style>
        :root { 
            --theme-color: #f97316; 
            --theme-bg-light: rgba(249, 115, 22, 0.1); 
            --theme-border: rgba(249, 115, 22, 0.3);
        }

        .text-theme { color: var(--theme-color); transition: color 0.5s ease; }
        .bg-theme { background-color: var(--theme-color); transition: background-color 0.5s ease; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; margin: 0; padding: 20px 10px; color: #f8fafc; min-height: 100vh; }
        .container { background: #0f0f0f; width: 100%; max-width: 420px; border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); margin: auto; }
        
        #map { height: 320px; width: calc(100% - 24px); border-radius: 24px; margin: 0 12px 20px 12px; border: 1px solid var(--theme-border); }
        
        /* ESTILO DO MARCADOR CUSTOMIZADO (PONTINHOS) */
        .custom-marker {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 5px var(--theme-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .custom-marker:hover { transform: scale(1.4); z-index: 10; }

        .beach-list-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .beach-list-item.visitada { opacity: 0.4; filter: grayscale(1); border-left: 4px solid #4caf50; }
        
        .filter-btn { transition: all 0.3s ease; }
        .active-filter { background-color: var(--theme-color) !important; color: #000 !important; font-weight: 800; }
        
        .mapboxgl-popup-content { background: #111 !important; color: white !important; border-radius: 10px !important; padding: 8px 12px !important; font-size: 11px !important; border: 1px solid var(--theme-border); }
        .mapboxgl-popup-tip { border-top-color: #111 !important; }

        .back-btn { color: #94a3b8; font-size: 13px; font-weight: 700; background: none; border: none; cursor: pointer; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="body-theme">

<div class="container">
    <div class="p-4">
        <button onclick="window.location.href='index.html'" class="back-btn flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            VOLTAR AO INÍCIO
        </button>
    </div>

    <div class="profile-header" style="height: 140px; background-image: url('https://i.ibb.co/j9xkVr6N/Afaste-a-imagem-202604072042.jpg'); background-size: cover; background-position: center; border-bottom: 5px solid var(--theme-color); position: relative;">
        <div style="position: absolute; bottom: -30px; left: 20px; width: 70px; height: 70px; border: 3px solid #0f0f0f; border-radius: 50%; overflow: hidden; background: #222;">
            <img src="https://i.ibb.co/s9WK610w/Crie-uma-imagem-202604072021.jpg" class="w-full h-full object-cover">
        </div>
    </div>

    <div style="padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h2 class="font-bold text-lg text-white">Helder e Mayara</h2>
            <div class="text-[10px] font-bold uppercase tracking-widest text-theme">Explorar • Bombinhas</div>
        </div>
        <div class="text-right">
            <div id="temp-atual" class="text-xl font-black text-white">--°C</div>
            <div id="weather-desc" class="text-[8px] font-bold text-theme uppercase tracking-tighter">Sincronizando...</div>
        </div>
    </div>

    <div id="map" class="mt-4"></div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-6">
        <button onclick="filtrar('Todos', this)" class="px-4 py-2 rounded-xl bg-white/5 text-slate-400 text-[9px] font-black uppercase whitespace-nowrap filter-btn active-filter">Todos</button>
        <button onclick="filtrar('Mar Calmo', this)" class="px-4 py-2 rounded-xl bg-white/5 text-slate-400 text-[9px] font-black uppercase whitespace-nowrap filter-btn">🌊 Mar Calmo</button>
        <button onclick="filtrar('Com Ondas', this)" class="px-4 py-2 rounded-xl bg-white/5 text-slate-400 text-[9px] font-black uppercase whitespace-nowrap filter-btn">🏄 Ondas</button>
        <button onclick="filtrar('Trilhas', this)" class="px-4 py-2 rounded-xl bg-white/5 text-slate-400 text-[9px] font-black uppercase whitespace-nowrap filter-btn">🥾 Trilhas</button>
    </div>

    <div class="px-4 mb-6">
        <button id="btn-gps" onclick="ativarGPS()" class="w-full py-3.5 rounded-xl bg-white/5 border border-theme text-white font-black text-[9px] uppercase flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm text-theme">my_location</span>
            <span id="txt-gps">Ordenar por Proximidade</span>
        </button>
    </div>

    <div id="lista-praias" class="px-4 pb-10"></div>
</div>

<script src="praias-db.js"></script>

<script>
    mapboxgl.accessToken = 'Pk.eyJ1IjoiaGVsZGVyMTk5NSIsImEiOiJjbW50ZG4zYnIwbmJmMnNxMHZyeWFjNmpjIn0.dkfOtjk0PbNcD78S88dljw';

    const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
    let userLat = null, userLng = null, categoriaAtual = 'Todos', map;
    let markers = [];
    let favoritos = JSON.parse(localStorage.getItem('favs')) || [];
    let visitados = JSON.parse(localStorage.getItem('vis')) || [];

    function applyDynamicColors(timestampAtual, sunriseTs, sunsetTs) {
        const root = document.documentElement;
        const isNight = timestampAtual < sunriseTs || timestampAtual > sunsetTs;
        const themeColor = isNight ? '#3b82f6' : '#f97316';
        root.style.setProperty('--theme-color', themeColor);
        root.style.setProperty('--theme-bg-light', isNight ? 'rgba(59, 130, 246, 0.1)' : 'rgba(249, 115, 22, 0.1)');
        root.style.setProperty('--theme-border', isNight ? 'rgba(59, 130, 246, 0.3)' : 'rgba(249, 115, 22, 0.3)');
        renderizar();
    }

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=-27.148&lon=-48.487&appid=${API_KEY}&units=metric&lang=pt_br`);
            const data = await res.json();
            applyDynamicColors(data.dt, data.sys.sunrise, data.sys.sunset);
            document.getElementById('temp-atual').innerText = Math.round(data.main.temp) + "°C";
            document.getElementById('weather-desc').innerText = data.weather[0].description;
        } catch (e) {}
    }

    function initMap() {
        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12',
            center: [-48.487, -27.148],
            zoom: 11.5,
            pitch: 30
        });

        map.on('load', () => {
            // Ajustar o mapa para mostrar todos os pontos de uma vez
            const bounds = new mapboxgl.LngLatBounds();
            locaisBombinhas.forEach(l => bounds.extend([l.lng, l.lat]));
            map.fitBounds(bounds, { padding: 40, duration: 1000 });
            renderizar();
        });
    }

    function renderizar() {
        const container = document.getElementById('lista-praias');
        container.innerHTML = '';
        markers.forEach(m => m.remove());
        markers = [];

        let lista = categoriaAtual === 'Todos' ? [...locaisBombinhas] : locaisBombinhas.filter(l => l.cat === categoriaAtual);

        if (userLat && userLng) {
            lista.forEach(l => l.dist = haversine(userLat, userLng, l.lat, l.lng));
            lista.sort((a, b) => a.dist - b.dist);
        }

        const currentThemeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();

        lista.forEach(local => {
            const isFav = favoritos.includes(local.nome);
            const isVis = visitados.includes(local.nome);
            
            // Render Lista
            const card = document.createElement('div');
            card.className = `beach-list-item ${isVis ? 'visitada' : ''}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <h3 class="text-white font-bold text-sm tracking-tight">${local.nome}</h3>
                        <p class="text-[9px] text-theme font-black uppercase tracking-tighter">
                            ${local.cat} • ${local.dist ? local.dist + ' KM' : '--- KM'}
                        </p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="toggleFav('${local.nome}')" class="${isFav ? 'text-red-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isFav ? 1 : 0}">favorite</span>
                        </button>
                        <button onclick="toggleVis('${local.nome}')" class="${isVis ? 'text-green-500' : 'text-slate-600'}">
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' ${isVis ? 1 : 0}">check_circle</span>
                        </button>
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-4">${local.desc}</p>
                <a href="${local.maps}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-white/5 border border-theme rounded-xl text-white text-[10px] font-black uppercase">
                    <span class="material-symbols-outlined text-xs text-theme">directions</span> Rota
                </a>
            `;
            container.appendChild(card);

            // Criar Marcador Minimalista (Bolinha)
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.style.backgroundColor = isFav ? "#ef4444" : currentThemeColor;

            const marker = new mapboxgl.Marker(el)
                .setLngLat([local.lng, local.lat])
                .setPopup(new mapboxgl.Popup({ offset: 10 }).setHTML(`<b style="font-weight:800">${local.nome}</b>`))
                .addTo(map);
            
            markers.push(marker);
        });
    }

    function ativarGPS() {
        const txt = document.getElementById('txt-gps');
        txt.innerText = "GPS Ativo...";
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLng = pos.coords.longitude;
            renderizar();
            map.flyTo({ center: [userLng, userLat], zoom: 14 });
            
            new mapboxgl.Marker({ color: "#fff" })
                .setLngLat([userLng, userLat])
                .addTo(map);
        }, () => txt.innerText = "Erro GPS");
    }

    function toggleFav(n) {
        favoritos.includes(n) ? favoritos = favoritos.filter(i => i !== n) : favoritos.push(n);
        localStorage.setItem('favs', JSON.stringify(favoritos));
        renderizar();
    }

    function toggleVis(n) {
        visitados.includes(n) ? visitados = visitados.filter(i => i !== n) : visitados.push(n);
        localStorage.setItem('vis', JSON.stringify(visitados));
        renderizar();
    }

    function filtrar(cat, btn) {
        categoriaAtual = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
        btn.classList.add('active-filter');
        renderizar();
    }

    window.onload = () => { fetchWeather(); initMap(); };
</script>
</body>
</html>
