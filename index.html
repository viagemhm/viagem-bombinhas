<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Férias Bombinhas 🏖️</title><style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dff6ff, #b2ebf2);
    display: flex;
    justify-content: center;
    padding: 15px;
    margin: 0;
}

.container {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    padding: 20px;
    text-align: center;
}

.topo-perfil {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
}

.foto-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 2px solid #00acc1;
    object-fit: cover;
}

.clima-card {
    background: linear-gradient(135deg, #00acc1, #0077ff);
    color: white;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 15px;
}

.financas {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.card-f {
    background: #f9f9f9;
    padding: 12px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: bold;
}

.checklist {
    text-align: left;
    margin-top: 18px;
    font-size: 13px;
    background: #fffde7;
    padding: 14px;
    border-radius: 14px;
}

.praias {
    margin-top: 18px;
    padding: 14px;
    border-radius: 16px;
    color: white;
    background: linear-gradient(135deg, #00acc1, #0077ff);
}

.praia-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 12px;
    margin-top: 8px;
}

.btn-maps {
    background: #0077ff;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
}
</style></head><body>
<div class="container"><div class="topo-perfil">
<img src="https://i.ibb.co/cpfKB8d/4-de-abr-de-2026-11-11-40.png" class="foto-logo">
<h1>Helder e Mayara em Bombinhas</h1>
</div><div style="display:flex; justify-content:space-around; margin:10px 0;">
    <div><strong id="visitadas">0</strong><br>Visitadas</div>
    <div><strong id="restantes">0</strong><br>Faltam</div>
</div><div class="clima-card">
<div id="hora" style="font-size: 24px;"></div>
<div id="temp">Carregando clima...</div>
</div><div class="financas">
<div class="card-f">Orçamento <strong>R$ 0</strong></div>
<div class="card-f">Gasto <strong>R$ 0</strong></div>
<div class="card-f">Saldo <strong>R$ 0</strong></div>
</div><div class="checklist">
<h3>🎒 Check-list</h3>
<label><input type="checkbox"> Protetor Solar</label><br>
<label><input type="checkbox"> Tênis</label>
</div><div class="praias">
<h3>🏖️ Praias</h3>
<div id="lista-praias">
<div class="praia-card">
<label><input type="checkbox" data-id="bombinhas"> Bombinhas</label>
<button class="btn-maps">📍</button>
</div>
</div>
</div></div><script>

// relógio
setInterval(() => {
    document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR');
}, 1000);

// CLIMA
fetch("https://api.openweathermap.org/data/2.5/weather?q=Bombinhas,BR&appid=cc78026071390eea9efc3ebf84f27bcd&units=metric&lang=pt_br")
.then(r => r.json())
.then(d => {
    document.getElementById('temp').innerText = d.weather[0].description + " | " + Math.round(d.main.temp) + "°C";
});

// PLANILHA (TSV)
async function carregarPlanilha() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjndkscJNSa1uHNlh_3al_4smBXaiXrGKF27dIf_vK6uwUGF0eb_UzHj74Plx-cZ6PwE0EhnWSW-xA/pub?gid=0&single=true&output=tsv";

    const res = await fetch(url);
    const texto = await res.text();

    const linhas = texto.split("\n");
    const valores = linhas[1].split("\t");

    const orcamento = parseFloat(valores[0]);
    const gasto = parseFloat(valores[1]);
    const saldo = parseFloat(valores[2]);

    const campos = document.querySelectorAll('.card-f strong');

    campos[0].innerText = orcamento.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
    campos[1].innerText = gasto.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
    campos[2].innerText = saldo.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
}

carregarPlanilha();

</script></body>
</html>
