<script>
const lista = document.getElementById('lista-praias');

function salvar() {
    document.querySelectorAll('#lista-praias input').forEach(input => {
        localStorage.setItem(input.dataset.id, input.checked);
    });
}

function carregar() {
    document.querySelectorAll('#lista-praias input').forEach(input => {
        const valor = localStorage.getItem(input.dataset.id);
        input.checked = valor === 'true';

        input.onchange = () => {
            salvar();
            atualizarStatus();
            ordenarLista();
        };
    });
}

function atualizarStatus() {
    const inputs = document.querySelectorAll('#lista-praias input');
    let visitadas = 0;

    inputs.forEach(i => {
        if (i.checked) visitadas++;
    });

    document.getElementById('visitadas').innerText = visitadas;
    document.getElementById('restantes').innerText = inputs.length - visitadas;
}

function ordenarLista() {
    const items = Array.from(lista.children);

    items.sort((a, b) => {
        const aChecked = a.querySelector('input').checked;
        const bChecked = b.querySelector('input').checked;
        return aChecked - bChecked;
    });

    items.forEach(el => lista.appendChild(el));
}

carregar();
atualizarStatus();
ordenarLista();
</script>
