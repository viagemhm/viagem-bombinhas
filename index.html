<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Férias Bombinhas 🏖️</title><style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dff6ff, #b2ebf2);
    display: flex;
    justify-content: center;
    padding: 15px;
    margin: 0;
}

.container {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    padding: 20px;
    text-align: center;
}

.topo-perfil {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
}

.foto-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 2px solid #00acc1;
    object-fit: cover;
}

.clima-card {
    background: linear-gradient(135deg, #00acc1, #0077ff);
    color: white;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 15px;
}

.financas {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.card-f {
    background: #f9f9f9;
    padding: 12px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: bold;
}

.checklist {
    text-align: left;
    margin-top: 18px;
    font-size: 13px;
    background: #fffde7;
    padding: 14px;
    border-radius: 14px;
}

.praias {
    margin-top: 18px;
    padding: 14px;
    border-radius: 16px;
    color: white;
    background: linear-gradient(135deg, #00acc1, #0077ff);
}

.praia-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 12px;
    margin-top: 8px;
}

.btn-maps {
    background: #0077ff;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
}
</style></head><body>
<div class="container"><div class="topo-perfil">
<img src="https://i.ibb.co/cpfKB8d/4-de-abr-de-2026-11-11-40.png" class="foto-logo">
<h1>Helder e Mayara em Bombinhas</h1>
</div><div style="display:flex; justify-content:space-around; margin:10px 0;">
    <div><strong id="visitadas">0</strong><br>Visitadas</div>
    <div><strong id="restantes">0</strong><br>Faltam</div>
</div><!-- DATA + CONTAGEM --><div style="margin-bottom:15px; text-align:left;">
    <div><strong>Data Viagem:</strong> 🗓️ 05/05 a 11/05</div>
    <div><strong>Contagem Regressiva:</strong> <span id="countdown"></span></div>
</div><div class="clima-card">
<div style="display:flex; align-items:center; justify-content:space-between;">
    <div id="icone-clima"></div>
    <div>
        <div style="font-size:11px; opacity:0.8;">Horário atual</div>
        <div id="hora" style="font-size: 24px; font-weight:bold;"></div>
</div>
<div id="temp">Carregando clima...</div>
<div id="extra-clima" style="font-size:12px; opacity:0.9; margin-top:4px;"></div>
</div><div class="financas">
<div class="card-f">Orçamento <strong>R$ 0</strong></div>
<div class="card-f">Gasto <strong>R$ 0</strong></div>
<div class="card-f">Saldo <strong>R$ 0</strong></div>
</div><div class="checklist">
<h3>🎒 Check-list</h3>
<label><input type="checkbox"> Protetor Solar ☀️</label><br>
<label><input type="checkbox"> Tênis Trilha👟</label><br>
<label><input type="checkbox"> Repelente 🦟</label>
</div><div class="praias">
<h3>🏖️ Praias</h3>
<div id="lista-praias"><div class="praia-card"><label><input type="checkbox"> Praia de Bombinhas</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+de+Bombinhas" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia da Sepultura</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+da+Sepultura" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia do Retiro dos Padres</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+Retiro+dos+Padres" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia de Quatro Ilhas</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+de+Quatro+Ilhas" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia de Bombas</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+de+Bombas" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia da Tainha</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+da+Tainha" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Canto Grande</label><a href="https://www.google.com/maps/dir/?api=1&destination=Canto+Grande" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Praia de Zimbros</label><a href="https://www.google.com/maps/dir/?api=1&destination=Praia+de+Zimbros" target="_blank"><button class="btn-maps">📍</button></a></div><div class="praia-card"><label><input type="checkbox"> Morro do Macaco</label><a href="https://www.google.com/maps/dir/?api=1&destination=Morro+do+Macaco" target="_blank"><button class="btn-maps">📍</button></a></div></div>
</div></div><script>

// relógio
setInterval(() => {
    document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR');
}, 1000);

// contagem regressiva
const dataViagem = new Date("2026-05-05T00:00:00");

setInterval(() => {
    const agora = new Date();
    const diff = dataViagem - agora;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);

    document.getElementById('countdown').innerText = `${dias} dias e ${horas}h`;
}, 1000);

// CLIMA COM CORES DINÂMICAS (SEM QUEBRAR)
fetch("https://api.openweathermap.org/data/2.5/weather?q=Bombinhas,BR&appid=cc78026071390eea9efc3ebf84f27bcd&units=metric&lang=pt_br")
.then(r => r.json())
.then(d => {
    const desc = d.weather[0].description;
    const temp = Math.round(d.main.temp);
    const clima = d.weather[0].main;

    document.getElementById('temp').innerText = desc + " | " + temp + "°C";
    document.getElementById('icone-clima').innerHTML = iconeClima(clima);

    const min = Math.round(d.main.temp_min);
    const max = Math.round(d.main.temp_max);
    const vento = Math.round(d.wind.speed);

    document.getElementById('extra-clima').innerText = `Min ${min}° / Máx ${max}° • Vento ${vento} m/s`;

    function iconeClima(main){
        if(main.includes("Clear")) return "<img src='https://cdn-icons-png.flaticon.com/512/869/869869.png' width='50'>";
        if(main.includes("Cloud")) return "<img src='https://cdn-icons-png.flaticon.com/512/414/414825.png' width='50'>";
        if(main.includes("Rain")) return "<img src='https://cdn-icons-png.flaticon.com/512/1163/1163624.png' width='50'>";
        return "<img src='https://cdn-icons-png.flaticon.com/512/869/869869.png' width='50'>";
    }

    function corClima(main) {
        if (main.includes("Clear")) return "linear-gradient(135deg, #f57f17, #ffb300)";
        if (main.includes("Cloud")) return "linear-gradient(135deg, #90a4ae, #607d8b)";
        if (main.includes("Rain")) return "linear-gradient(135deg, #4fc3f7, #0288d1)";
        if (main.includes("Thunder")) return "linear-gradient(135deg, #616161, #212121)";
        return "linear-gradient(135deg, #00acc1, #0077ff)";
    }

    const cor = corClima(clima);
    document.querySelector('.clima-card').style.background = cor;
    document.querySelector('.praias').style.background = cor;

    // destaque simples (seguro)
    const melhor = clima.includes("Clear") ? "Bombinhas" : (clima.includes("Rain") ? "Sepultura" : "Bombinhas");

    document.querySelectorAll('.praia-card').forEach(card => {
        if (card.innerText.includes(melhor)) {
            card.style.outline = "2px solid #fff";
        }
    });

})
.catch(() => {
    document.getElementById('temp').innerText = "Erro ao carregar clima";
});

// PLANILHA
async function carregarPlanilha() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjndkscJNSa1uHNlh_3al_4smBXaiXrGKF27dIf_vK6uwUGF0eb_UzHj74Plx-cZ6PwE0EhnWSW-xA/pub?gid=0&single=true&output=tsv";

    const res = await fetch(url);
    const text = await res.text();

    const linhas = text.split("
");
    const valores = linhas[1].split("	");

    const orcamento = parseFloat(valores[0]);
    const gasto = parseFloat(valores[1]);
    const saldo = parseFloat(valores[2]);

    const campos = document.querySelectorAll('.card-f strong');

    campos[0].innerText = orcamento.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
    campos[1].innerText = gasto.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
    campos[2].innerText = saldo.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
}

carregarPlanilha();

</script></body>
</html>
